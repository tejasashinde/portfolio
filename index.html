    function formatSudokuTime(seconds) {
        const total = Math.max(0, Math.floor(seconds || 0));
        const minutes = Math.floor(total / 60);
        const remaining = total % 60;
        return String(minutes).padStart(2, "0") + ":" + String(remaining).padStart(2, "0");
    }

    function shuffleSudokuArray(values) {
        const next = values.slice();
        for (let index = next.length - 1; index > 0; index -= 1) {
            const swapIndex = Math.floor(Math.random() * (index + 1));
            const temp = next[index];
            next[index] = next[swapIndex];
            next[swapIndex] = temp;
        }
        return next;
    }

    function cloneSudokuGrid(grid) {
        return grid.map((row) => row.slice());
    }

    function createSudokuSolution() {
        const base = [];
        for (let row = 0; row < 9; row += 1) {
            const nextRow = [];
            for (let col = 0; col < 9; col += 1) {
                nextRow.push(((row * 3 + Math.floor(row / 3) + col) % 9) + 1);
            }
            base.push(nextRow);
        }

        const digitMap = shuffleSudokuArray([1, 2, 3, 4, 5, 6, 7, 8, 9]);
        let solved = base.map((row) => row.map((value) => digitMap[value - 1]));

        if (Math.random() < 0.5) {
            solved = solved[0].map((_, col) => solved.map((row) => row[col]));
        }

        const bandOrder = shuffleSudokuArray([0, 1, 2]);
        const stackOrder = shuffleSudokuArray([0, 1, 2]);
        const rowOrder = [];
        const colOrder = [];

        bandOrder.forEach((band) => {
            shuffleSudokuArray([0, 1, 2]).forEach((offset) => {
                rowOrder.push(band * 3 + offset);
            });
        });

        stackOrder.forEach((stack) => {
            shuffleSudokuArray([0, 1, 2]).forEach((offset) => {
                colOrder.push(stack * 3 + offset);
            });
        });

        return rowOrder.map((row) => colOrder.map((col) => solved[row][col]));
    }

    function getSudokuCandidates(grid, row, col) {
        if (grid[row][col] !== 0) {
            return [];
        }

        const blocked = new Set();
        for (let index = 0; index < 9; index += 1) {
            blocked.add(grid[row][index]);
            blocked.add(grid[index][col]);
        }

        const boxRow = Math.floor(row / 3) * 3;
        const boxCol = Math.floor(col / 3) * 3;
        for (let nextRow = boxRow; nextRow < boxRow + 3; nextRow += 1) {
            for (let nextCol = boxCol; nextCol < boxCol + 3; nextCol += 1) {
                blocked.add(grid[nextRow][nextCol]);
            }
        }

        const candidates = [];
        for (let value = 1; value <= 9; value += 1) {
            if (!blocked.has(value)) {
                candidates.push(value);
            }
        }
        return candidates;
    }

    function selectSudokuCellForSolve(grid) {
        let bestCell = null;
        let bestCandidates = null;

        for (let row = 0; row < 9; row += 1) {
            for (let col = 0; col < 9; col += 1) {
                if (grid[row][col] !== 0) continue;
                const candidates = getSudokuCandidates(grid, row, col);
                if (!candidates.length) {
                    return { dead: true };
                }
                if (!bestCandidates || candidates.length < bestCandidates.length) {
                    bestCell = { row: row, col: col };
                    bestCandidates = candidates;
                    if (candidates.length === 1) {
                        return { row: row, col: col, candidates: candidates };
                    }
                }
            }
        }

        if (!bestCell) {
            return null;
        }

        return { row: bestCell.row, col: bestCell.col, candidates: bestCandidates };
    }

    function countSudokuSolutions(grid, limit) {
        const target = Math.max(1, limit || 2);
        const nextCell = selectSudokuCellForSolve(grid);
        if (!nextCell) {
            return 1;
        }
        if (nextCell.dead) {
            return 0;
        }

        let count = 0;
        for (const value of nextCell.candidates) {
            grid[nextCell.row][nextCell.col] = value;
            count += countSudokuSolutions(grid, target - count);
            if (count >= target) {
                break;
            }
        }
        grid[nextCell.row][nextCell.col] = 0;
        return count;
    }

    function createSudokuPuzzle(solution, cluesTarget) {
        const puzzle = cloneSudokuGrid(solution);
        const positions = shuffleSudokuArray(Array.from({ length: 81 }, (_, index) => index));
        let filledCount = 81;

        for (const position of positions) {
            if (filledCount <= cluesTarget) {
                break;
            }

            const row = Math.floor(position / 9);
            const col = position % 9;
            const savedValue = puzzle[row][col];
            if (!savedValue) continue;
            puzzle[row][col] = 0;

            const testGrid = cloneSudokuGrid(puzzle);
            if (countSudokuSolutions(testGrid, 2) !== 1) {
                puzzle[row][col] = savedValue;
            } else {
                filledCount -= 1;
            }
        }

        return puzzle;
    }

    function buildSudokuBoard(state) {
        if (!state.boardEl) return;

        state.boardEl.innerHTML = "";
        state.cells = [];
        state.cellButtons = [];

        for (let row = 0; row < 9; row += 1) {
            const rowCells = [];
            for (let col = 0; col < 9; col += 1) {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "sudoku-cell";
                if (col % 3 === 2 && col < 8) button.classList.add("sudoku-cell--block-end");
                if (row % 3 === 2 && row < 8) button.classList.add("sudoku-cell--row-end");
                button.setAttribute("data-sudoku-cell", "");
                button.dataset.row = String(row);
                button.dataset.col = String(col);
                button.setAttribute("aria-label", "Sudoku cell");

                const valueEl = document.createElement("span");
                valueEl.className = "sudoku-cell__value";

                const notesEl = document.createElement("span");
                notesEl.className = "sudoku-cell__notes";
                const noteEls = [];
                for (let note = 1; note <= 9; note += 1) {
                    const noteSpan = document.createElement("span");
                    noteSpan.dataset.note = String(note);
                    notesEl.appendChild(noteSpan);
                    noteEls.push(noteSpan);
                }

                button.appendChild(valueEl);
                button.appendChild(notesEl);

                rowCells.push({
                    row: row,
                    col: col,
                    fixed: false,
                    value: 0,
                    notes: new Set(),
                    conflict: false,
                    button: button,
                    valueEl: valueEl,
                    noteEls: noteEls
                });

                state.cellButtons.push(button);
                state.boardEl.appendChild(button);
            }
            state.cells.push(rowCells);
        }
    }

    function snapshotSudokuState(state) {
        return {
            selectedRow: state.selectedRow,
            selectedCol: state.selectedCol,
            notesMode: state.notesMode,
            cells: state.cells.map((row) => row.map((cell) => ({
                value: cell.value,
                notes: Array.from(cell.notes)
            })))
        };
    }

    function persistSudokuState(state) {
        try {
            window.localStorage.setItem(state.storageKey, JSON.stringify({
                version: 1,
                levelKey: state.levelKey,
                puzzle: state.puzzle,
                solution: state.solution,
                cells: state.cells.map((row) => row.map((cell) => ({
                    fixed: cell.fixed,
                    value: cell.value,
                    notes: Array.from(cell.notes)
                }))),
                selectedRow: state.selectedRow,
                selectedCol: state.selectedCol,
                notesMode: state.notesMode,
                timer: state.timer,
                paused: state.paused,
                won: state.won
            }));
        } catch (error) {
            return false;
        }
        return true;
    }

    function applySudokuSnapshot(state, snapshot) {
        if (!snapshot || !snapshot.cells) return;

        state.selectedRow = Math.max(0, Math.min(8, snapshot.selectedRow || 0));
        state.selectedCol = Math.max(0, Math.min(8, snapshot.selectedCol || 0));
        state.notesMode = Boolean(snapshot.notesMode);

        snapshot.cells.forEach((row, rowIndex) => {
            row.forEach((cellState, colIndex) => {
                const cell = state.cells[rowIndex] && state.cells[rowIndex][colIndex];
                if (!cell || cell.fixed) return;
                cell.value = Number(cellState.value) || 0;
                cell.notes = new Set((cellState.notes || []).map((value) => Number(value)).filter(Boolean));
            });
        });

        recomputeSudokuConflicts(state);
        syncSudokuUi(state);
        persistSudokuState(state);
    }

    function restoreSudokuFromStorage(state) {
        try {
            const raw = window.localStorage.getItem(state.storageKey);
            if (!raw) return false;
            const saved = JSON.parse(raw);
            if (!saved || saved.version !== 1) return false;
            if (!Array.isArray(saved.puzzle) || saved.puzzle.length !== 9) return false;
            if (!Array.isArray(saved.solution) || saved.solution.length !== 9) return false;

            state.levelKey = sudokuPresets[saved.levelKey] ? saved.levelKey : "easy";
            state.puzzle = cloneSudokuGrid(saved.puzzle);
            state.solution = cloneSudokuGrid(saved.solution);
            state.timer = Math.max(0, Number(saved.timer) || 0);
            state.paused = Boolean(saved.paused);
            state.won = Boolean(saved.won);
            state.notesMode = Boolean(saved.notesMode);
            state.selectedRow = Math.max(0, Math.min(8, Number(saved.selectedRow) || 0));
            state.selectedCol = Math.max(0, Math.min(8, Number(saved.selectedCol) || 0));

            state.cells.forEach((row, rowIndex) => {
                row.forEach((cell, colIndex) => {
                    const puzzleValue = state.puzzle[rowIndex] && state.puzzle[rowIndex][colIndex] ? Number(state.puzzle[rowIndex][colIndex]) : 0;
                    const savedCell = saved.cells && saved.cells[rowIndex] && saved.cells[rowIndex][colIndex] ? saved.cells[rowIndex][colIndex] : null;
                    cell.fixed = Boolean(puzzleValue);
                    cell.value = cell.fixed ? puzzleValue : Math.max(0, Number(savedCell && savedCell.value) || 0);
                    cell.notes = new Set((savedCell && savedCell.notes ? savedCell.notes : []).map((value) => Number(value)).filter(Boolean));
                    if (cell.fixed) {
                        cell.notes.clear();
                    }
                });
            });

            state.historyPast = [];
            state.historyFuture = [];
            recomputeSudokuConflicts(state);
            return true;
        } catch (error) {
            return false;
        }
    }

    function recomputeSudokuConflicts(state) {
        state.cells.forEach((row) => row.forEach((cell) => {
            cell.conflict = false;
        }));

        const markGroups = (groups) => {
            groups.forEach((positions) => {
                const seen = new Map();
                positions.forEach((position) => {
                    const cell = state.cells[position[0]][position[1]];
                    if (!cell.value) return;
                    if (!seen.has(cell.value)) {
                        seen.set(cell.value, []);
                    }
                    seen.get(cell.value).push(cell);
                });
                seen.forEach((cells) => {
                    if (cells.length > 1) {
                        cells.forEach((cell) => {
                            cell.conflict = true;
                        });
                    }
                });
            });
        };

        const rows = [];
        const cols = [];
        const boxes = [];
        for (let index = 0; index < 9; index += 1) {
            rows.push(Array.from({ length: 9 }, (_, col) => [index, col]));
            cols.push(Array.from({ length: 9 }, (_, row) => [row, index]));
        }
        for (let boxRow = 0; boxRow < 3; boxRow += 1) {
            for (let boxCol = 0; boxCol < 3; boxCol += 1) {
                const positions = [];
                for (let row = boxRow * 3; row < boxRow * 3 + 3; row += 1) {
                    for (let col = boxCol * 3; col < boxCol * 3 + 3; col += 1) {
                        positions.push([row, col]);
                    }
                }
                boxes.push(positions);
            }
        }

        markGroups(rows);
        markGroups(cols);
        markGroups(boxes);
    }

    function updateSudokuLayout(state) {
        if (!state || !state.boardEl || !state.boardEl.parentElement) return;
        const viewport = state.boardEl.parentElement;
        const availableWidth = Math.max(160, viewport.clientWidth - 8);
        const availableHeight = Math.max(160, viewport.clientHeight - 8);
        const tileSize = Math.max(28, Math.floor(Math.min(availableWidth / 9, availableHeight / 9, 58)));
        state.boardEl.style.setProperty("--sudoku-cell-size", tileSize + "px");
        state.boardEl.style.gridTemplateColumns = "repeat(9, var(--sudoku-cell-size))";
        state.boardEl.style.gridTemplateRows = "repeat(9, var(--sudoku-cell-size))";
    }

    function focusSudokuSelection(state) {
        const selected = state.cells[state.selectedRow] && state.cells[state.selectedRow][state.selectedCol];
        if (selected && selected.button) {
            selected.button.focus({ preventScroll: true });
        }
    }

    function selectSudokuCell(state, row, col, options) {
        if (!state.cells[row] || !state.cells[row][col]) return;
        state.selectedRow = row;
        state.selectedCol = col;
        syncSudokuUi(state);
        if (!options || options.focus !== false) {
            focusSudokuSelection(state);
        }
    }

    function firstEditableSudokuCell(state) {
        for (let row = 0; row < 9; row += 1) {
            for (let col = 0; col < 9; col += 1) {
                if (!state.cells[row][col].fixed) {
                    return [row, col];
                }
            }
        }
        return [0, 0];
    }

    function syncSudokuUi(state) {
        if (!state) return;

        const preset = sudokuPresets[state.levelKey] || sudokuPresets.easy;
        if (state.levelEl) state.levelEl.textContent = preset.label;
        if (state.difficultyEl) state.difficultyEl.textContent = preset.label + " Difficulty";
        if (state.timeEl) state.timeEl.textContent = formatSudokuTime(state.timer);
        if (state.notesButton) state.notesButton.classList.toggle("is-active", state.notesMode);
        if (state.notesToggle) state.notesToggle.checked = state.notesMode;
        if (state.menuEl) state.menuEl.hidden = !state.menuOpen;
        if (state.overlayEl) {
            state.overlayEl.textContent = state.won ? "Solved" : state.paused ? "Paused" : "";
        }
        if (state.container) {
            state.container.classList.toggle("is-paused", state.paused && !state.won);
            state.container.classList.toggle("is-won", state.won);
        }

        recomputeSudokuConflicts(state);

        let filledCount = 0;
        state.cells.forEach((row, rowIndex) => {
            row.forEach((cell, colIndex) => {
                if (cell.value) filledCount += 1;
                const button = cell.button;
                if (!button) return;

                const sameBand = Math.floor(rowIndex / 3) === Math.floor(state.selectedRow / 3) && Math.floor(colIndex / 3) === Math.floor(state.selectedCol / 3);
                const isSelected = rowIndex === state.selectedRow && colIndex === state.selectedCol;
                const isPeer = rowIndex === state.selectedRow || colIndex === state.selectedCol || sameBand;
                const selectedCell = state.cells[state.selectedRow] && state.cells[state.selectedRow][state.selectedCol];
                const selectedValue = selectedCell ? selectedCell.value : 0;

                button.className = "sudoku-cell";
                if (colIndex % 3 === 2 && colIndex < 8) button.classList.add("sudoku-cell--block-end");
                if (rowIndex % 3 === 2 && rowIndex < 8) button.classList.add("sudoku-cell--row-end");
                if (cell.fixed) button.classList.add("sudoku-cell--given");
                if (isSelected) button.classList.add("sudoku-cell--selected");
                if (!isSelected && isPeer) button.classList.add("sudoku-cell--peer");
                if (selectedValue && cell.value && cell.value === selectedValue) button.classList.add("sudoku-cell--same-value");
                if (cell.conflict) button.classList.add("sudoku-cell--conflict");
                if (cell.value) button.classList.add("sudoku-cell--has-value");

                button.disabled = state.paused || state.won;
                const labelParts = ["Row " + (rowIndex + 1), "Column " + (colIndex + 1)];
                if (cell.fixed) {
                    labelParts.push("given " + cell.value);
                } else if (cell.value) {
                    labelParts.push("value " + cell.value);
                } else {
                    labelParts.push("empty");
                }
                if (cell.conflict) {
                    labelParts.push("conflict");
                }
                button.setAttribute("aria-label", labelParts.join(", "));

                if (cell.valueEl) {
                    cell.valueEl.textContent = cell.value ? String(cell.value) : "";
                }
                if (cell.noteEls) {
                    cell.noteEls.forEach((noteEl, noteIndex) => {
                        const noteValue = noteIndex + 1;
                        noteEl.textContent = cell.notes.has(noteValue) && !cell.value ? String(noteValue) : "";
                    });
                }
            });
        });

        if (state.progressEl) {
            state.progressEl.textContent = filledCount + " / 81";
        }
        if (state.solvedCountEl) {
            state.solvedCountEl.textContent = filledCount + " / 81";
        }
    }

    function startSudokuTimer(state) {
        if (state.timerId || state.paused || state.won) return;
        state.timerId = window.setInterval(() => {
            if (state.paused || state.won) return;
            state.timer += 1;
            if (state.timeEl) {
                state.timeEl.textContent = formatSudokuTime(state.timer);
            }
        }, 1000);
    }

    function stopSudokuTimer(state) {
        if (state.timerId) {
            window.clearInterval(state.timerId);
            state.timerId = null;
        }
    }

    function saveSudokuSnapshot(state) {
        state.historyPast.push(snapshotSudokuState(state));
        if (state.historyPast.length > 50) {
            state.historyPast.shift();
        }
        state.historyFuture = [];
    }

    function undoSudokuMove(state) {
        if (!state.historyPast.length) return;
        const current = snapshotSudokuState(state);
        const previous = state.historyPast.pop();
        state.historyFuture.push(current);
        applySudokuSnapshot(state, previous);
    }

    function redoSudokuMove(state) {
        if (!state.historyFuture.length) return;
        const current = snapshotSudokuState(state);
        const next = state.historyFuture.pop();
        state.historyPast.push(current);
        applySudokuSnapshot(state, next);
    }

    function toggleSudokuNotesMode(state, nextValue) {
        const nextMode = typeof nextValue === "boolean" ? nextValue : !state.notesMode;
        state.notesMode = nextMode;
        syncSudokuUi(state);
        persistSudokuState(state);
    }

    function toggleSudokuMenu(state, nextOpen) {
        const shouldOpen = typeof nextOpen === "boolean" ? nextOpen : !state.menuOpen;
        state.menuOpen = shouldOpen;
        syncSudokuUi(state);
    }

    function toggleSudokuPause(state) {
        if (state.won) return;
        state.paused = !state.paused;
        if (state.paused) {
            stopSudokuTimer(state);
        } else {
            startSudokuTimer(state);
        }
        syncSudokuUi(state);
        persistSudokuState(state);
    }

    function generateSudokuGame(state, presetKey) {
        const preset = sudokuPresets[presetKey] || sudokuPresets.easy;
        state.levelKey = sudokuPresets[presetKey] ? presetKey : "easy";
        state.solution = createSudokuSolution();
        state.puzzle = createSudokuPuzzle(state.solution, preset.clues);
        state.timer = 0;
        state.paused = false;
        state.won = false;
        state.notesMode = false;
        state.menuOpen = false;
        state.historyPast = [];
        state.historyFuture = [];
        state.cells.forEach((row, rowIndex) => {
            row.forEach((cell, colIndex) => {
                const value = state.puzzle[rowIndex][colIndex];
                cell.fixed = Boolean(value);
                cell.value = value || 0;
                cell.notes = new Set();
            });
        });
        const firstCell = firstEditableSudokuCell(state);
        state.selectedRow = firstCell[0];
        state.selectedCol = firstCell[1];
        stopSudokuTimer(state);
        syncSudokuUi(state);
        persistSudokuState(state);
        focusSudokuSelection(state);
    }

    function clearSudokuBoard(state) {
        saveSudokuSnapshot(state);
        state.cells.forEach((row) => {
            row.forEach((cell) => {
                if (!cell.fixed) {
                    cell.value = 0;
                    cell.notes.clear();
                }
            });
        });
        state.won = false;
        syncSudokuUi(state);
        persistSudokuState(state);
    }

    function enterSudokuValue(state, value) {
        if (!state || state.paused || state.won) return;
        const selected = state.cells[state.selectedRow] && state.cells[state.selectedRow][state.selectedCol];
        if (!selected || selected.fixed) return;

        const nextValue = Math.max(1, Math.min(9, Number(value) || 0));
        if (!nextValue) return;

        saveSudokuSnapshot(state);
        if (state.notesMode) {
            if (selected.notes.has(nextValue)) {
                selected.notes.delete(nextValue);
            } else {
                selected.notes.add(nextValue);
            }
        } else {
            selected.value = selected.value === nextValue ? 0 : nextValue;
            selected.notes.clear();
            if (selected.value && !state.timerId) {
                startSudokuTimer(state);
            }
        }

        state.menuOpen = false;
        syncSudokuUi(state);
        checkSudokuWin(state);
        persistSudokuState(state);
    }

    function clearSudokuValue(state) {
        if (!state || state.paused || state.won) return;
        const selected = state.cells[state.selectedRow] && state.cells[state.selectedRow][state.selectedCol];
        if (!selected || selected.fixed || (!selected.value && !selected.notes.size)) return;

        saveSudokuSnapshot(state);
        selected.value = 0;
        selected.notes.clear();
        state.menuOpen = false;
        syncSudokuUi(state);
        persistSudokuState(state);
    }

    function moveSudokuSelection(state, rowDelta, colDelta) {
        const nextRow = Math.max(0, Math.min(8, state.selectedRow + rowDelta));
        const nextCol = Math.max(0, Math.min(8, state.selectedCol + colDelta));
        selectSudokuCell(state, nextRow, nextCol);
    }

    function checkSudokuWin(state) {
        if (state.won) return;

        for (let row = 0; row < 9; row += 1) {
            for (let col = 0; col < 9; col += 1) {
                const cell = state.cells[row][col];
                if (!cell.value || cell.conflict) {
                    return;
                }
            }
        }

        state.won = true;
        state.paused = false;
        stopSudokuTimer(state);
        syncSudokuUi(state);
        persistSudokuState(state);
    }

    function handleSudokuKeyboard(state, event) {
        if (!state || !state.container.isConnected || activeWindowId !== state.appId) return;
        if (state.menuOpen && event.key === "Escape") {
            toggleSudokuMenu(state, false);
            event.preventDefault();
            return;
        }

        if (state.paused && !["p", "P", "Escape"].includes(event.key)) {
            return;
        }

        if (event.key === "ArrowUp") {
            event.preventDefault();
            moveSudokuSelection(state, -1, 0);
            return;
        }
        if (event.key === "ArrowDown") {
            event.preventDefault();
            moveSudokuSelection(state, 1, 0);
            return;
        }
        if (event.key === "ArrowLeft") {
            event.preventDefault();
            moveSudokuSelection(state, 0, -1);
            return;
        }
        if (event.key === "ArrowRight") {
            event.preventDefault();
            moveSudokuSelection(state, 0, 1);
            return;
        }
        if (event.key === "Backspace" || event.key === "Delete" || event.key === "0") {
            event.preventDefault();
            clearSudokuValue(state);
            return;
        }
        if (event.key >= "1" && event.key <= "9") {
            event.preventDefault();
            enterSudokuValue(state, Number(event.key));
            return;
        }
        if (event.key === "n" || event.key === "N") {
            event.preventDefault();
            toggleSudokuNotesMode(state);
            return;
        }
        if (event.key === "u" || (event.key === "z" && event.ctrlKey)) {
            event.preventDefault();
            undoSudokuMove(state);
            return;
        }
        if ((event.key === "y" && event.ctrlKey) || (event.key === "Z" && event.ctrlKey && event.shiftKey)) {
            event.preventDefault();
            redoSudokuMove(state);
            return;
        }
        if (event.key === "p" || event.key === "P") {
            event.preventDefault();
            toggleSudokuPause(state);
        }
    }

    function bindSudokuControls(state) {
        if (!state || !state.container) return;

        state.container.addEventListener("click", (event) => {
            const cellButton = event.target.closest("[data-sudoku-cell]");
            if (cellButton && state.container.contains(cellButton)) {
                const row = Number(cellButton.dataset.row);
                const col = Number(cellButton.dataset.col);
                if (Number.isFinite(row) && Number.isFinite(col)) {
                    selectSudokuCell(state, row, col);
                }
                return;
            }

            const keyButton = event.target.closest("[data-sudoku-key]");
            if (keyButton && state.container.contains(keyButton)) {
                enterSudokuValue(state, Number(keyButton.getAttribute("data-sudoku-key")));
                return;
            }

            const actionButton = event.target.closest("[data-sudoku-action]");
            if (!actionButton || !state.container.contains(actionButton)) return;
            const action = actionButton.getAttribute("data-sudoku-action");
            if (action === "undo") {
                undoSudokuMove(state);
            } else if (action === "redo") {
                redoSudokuMove(state);
            } else if (action === "notes") {
                toggleSudokuNotesMode(state);
            } else if (action === "menu") {
                toggleSudokuMenu(state);
            } else if (action === "pause") {
                toggleSudokuPause(state);
            } else if (action === "clear") {
                clearSudokuBoard(state);
            } else if (action === "new") {
                generateSudokuGame(state, state.levelKey);
            } else if (action === "print") {
                window.print();
            }
            return;
        });

        state.container.addEventListener("keydown", (event) => {
            handleSudokuKeyboard(state, event);
        });

        if (state.notesToggle) {
            state.notesToggle.addEventListener("change", () => {
                toggleSudokuNotesMode(state, state.notesToggle.checked);
            });
        }

        document.addEventListener("pointerdown", (event) => {
            if (!state.container.isConnected) return;
            if (state.menuOpen && !event.target.closest(".sudoku-menu, [data-sudoku-action='menu']")) {
                toggleSudokuMenu(state, false);
            }
        });
    }

    function bootSudoku(container, appId) {
        if (!container) return;
        if (container.dataset.ready === "true") {
            const existingState = container.__sudokuState;
            if (existingState) {
                updateSudokuLayout(existingState);
                syncSudokuUi(existingState);
                focusSudokuSelection(existingState);
            }
            return;
        }

        container.dataset.ready = "true";
        const state = {
            container: container,
            root: container,
            appId: appId || "sudoku",
            boardEl: container.querySelector("[data-sudoku-board]"),
            timeEl: container.querySelector("[data-sudoku-time]"),
            levelEl: container.querySelector("[data-sudoku-level]"),
            progressEl: container.querySelector("[data-sudoku-progress]"),
            difficultyEl: container.querySelector("[data-sudoku-difficulty]"),
            menuEl: container.querySelector("[data-sudoku-menu]"),
            overlayEl: container.querySelector("[data-sudoku-overlay]"),
            notesToggle: container.querySelector("[data-sudoku-notes-toggle]"),
            notesButton: container.querySelector("[data-sudoku-action='notes']"),
            levelKey: "easy",
            solution: [],
            puzzle: [],
            cells: [],
            cellButtons: [],
            selectedRow: 0,
            selectedCol: 0,
            notesMode: false,
            paused: false,
            won: false,
            menuOpen: false,
            timer: 0,
            timerId: null,
            historyPast: [],
            historyFuture: [],
            storageKey: "portfolio-sudoku-state",
            resizeHandler: null
        };

        container.__sudokuState = state;
        buildSudokuBoard(state);
        bindSudokuControls(state);

        if (!restoreSudokuFromStorage(state)) {
            generateSudokuGame(state, "easy");
        }

        state.resizeHandler = () => updateSudokuLayout(state);
        window.addEventListener("resize", state.resizeHandler);
        requestAnimationFrame(() => {
            updateSudokuLayout(state);
            syncSudokuUi(state);
            focusSudokuSelection(state);
        });
    }

    function openCalculatorWindow() {
        closeOverview();
        closeSystemMenu();

        if (!calculatorOverlayWindow) {
            const shell = document.querySelector(".desktop-shell") || document.body;
            const windowEl = document.createElement("section");
            windowEl.className = "desktop-window desktop-window--calculator calculator-window--overlay";
            windowEl.setAttribute("role", "dialog");
            windowEl.setAttribute("aria-label", "Calculator");
            windowEl.innerHTML = createCalculatorWindow();
            shell.appendChild(windowEl);

            const body = windowEl.querySelector(".calculator-shell");
            bootCalculator(body, "calculator");

            windowEl.addEventListener("mousedown", () => bringToFront(windowEl, "calculator"));
            makeWindowDraggable(windowEl, windowEl.querySelector(".calculator-toolbar"), "calculator");

            calculatorOverlayWindow = windowEl;
            windowRegistry.set("calculator", { app: apps.find((app) => app.id === "calculator"), window: windowEl });
        }

        calculatorOverlayWindow.classList.remove("is-hidden", "is-minimized");
        calculatorOverlayWindow.style.zIndex = String(highestZIndex + 1);
        bringToFront(calculatorOverlayWindow, "calculator");
        syncDockState();
    }

    function sanitizeCalculationExpression(expression) {
        return expression.replace(/\s+/g, "");
    }

    function evaluateCalculation(expression) {
        const sanitized = sanitizeCalculationExpression(expression);
        if (!sanitized.trim()) {
            return "0";
        }

        try {
            const result = Function("return (" + sanitized + ")")();
            if (typeof result !== "number" || !Number.isFinite(result)) {
                throw new Error("Invalid result");
            }
            return String(result);
        } catch (error) {
            return "Error";
        }
    }

    function bootCalculator(container, appId) {
        if (container.dataset.ready === "true") {
            return;
        }

        container.dataset.ready = "true";
        let tokens = [];
        let resultValue = "";
        let justEvaluated = false;
        let keyboardQueue = [];
        let keyboardQueueTimer = null;
        const expressionDisplay = container.querySelector("[data-calculator-expression]");
        const resultDisplay = container.querySelector("[data-calculator-result]");
        const keys = container.querySelectorAll("[data-calc-key]");
        const windowActionButtons = container.querySelectorAll("[data-window-action]");

        const tokenMap = {
            "÷": { display: "÷", eval: "/" },
            "×": { display: "×", eval: "*" },
            "−": { display: "−", eval: "-" },
            "+": { display: "+", eval: "+" },
            "%": { display: "%", eval: "%" },
            mod: { display: "mod", eval: "%" },
            "π": { display: "π", eval: "Math.PI" },
            "√": { display: "√(", eval: "Math.sqrt(" },
            "x²": { display: "x²", eval: "**2" },
            "(": { display: "(", eval: "(" },
            ")": { display: ")", eval: ")" },
            ".": { display: ".", eval: "." }
        };

        const isOperatorToken = (token) => ["÷", "×", "−", "+", "%", "mod"].includes(token);
        const isUnaryPrefixToken = (token) => ["π", "√", "x²", "("].includes(token);
        const isInputToken = (token) => /^[0-9.]$/.test(token);

        const getDisplayText = () => tokens.map((token) => token.display).join("");
        const getEvalText = () => tokens.map((token) => token.eval).join("");

        const escapeHtml = (value) => String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#39;");

        const normalizeExpression = (expression) => {
            let normalized = expression.replace(/Math\.sqrt\(/g, "Math.sqrt(");
            const openCount = (normalized.match(/\(/g) || []).length;
            const closeCount = (normalized.match(/\)/g) || []).length;
            if (openCount > closeCount) {
                normalized += ")".repeat(openCount - closeCount);
            }
            return normalized;
        };

        const renderDisplay = () => {
            const displayText = getDisplayText();
            expressionDisplay.innerHTML = "<span class='calculator-display__expression-content'>" + escapeHtml(displayText || " ") + "</span><span class='calculator-display__cursor' aria-hidden='true'></span>";
            resultDisplay.textContent = resultValue;
        };

        const pushToken = (token) => {
            if (justEvaluated && (isInputToken(token) || isUnaryPrefixToken(token))) {
                tokens = [];
                resultValue = "";
            }

            justEvaluated = false;

            const mapped = tokenMap[token] || { display: token, eval: token };

            if (isOperatorToken(token) && tokens.length === 0) {
                return;
            }

            if (isOperatorToken(token) && tokens.length > 0) {
                const lastToken = tokens[tokens.length - 1];
                if (lastToken && isOperatorToken(lastToken.display)) {
                    tokens[tokens.length - 1] = mapped;
                    return;
                }
            }

            if (token === "." && tokens.length > 0) {
                const lastToken = tokens[tokens.length - 1];
                if (lastToken && /\.$/.test(lastToken.display)) {
                    return;
                }
            }

            tokens.push(mapped);
        };

        const processKeyboardQueue = () => {
            if (keyboardQueueTimer || !keyboardQueue.length) {
                return;
            }
            keyboardQueueTimer = window.setInterval(() => {
                if (!keyboardQueue.length) {
                    window.clearInterval(keyboardQueueTimer);
                    keyboardQueueTimer = null;
                    return;
                }
                const nextToken = keyboardQueue.shift();
                if (nextToken === "DEL" || nextToken === "UNDO") {
                    if (justEvaluated) {
                        justEvaluated = false;
                    }
                    tokens.pop();
                    resultValue = "";
                } else if (nextToken === "AC") {
                    tokens = [];
                    resultValue = "";
                    justEvaluated = false;
                } else if (nextToken === "=") {
                    const expression = normalizeExpression(getEvalText());
                    resultValue = evaluateCalculation(expression);
                    tokens = [{ display: resultValue, eval: resultValue }];
                    justEvaluated = true;
                } else {
                    pushToken(nextToken);
                }
                renderDisplay();
            }, 120);
        };

        const enqueueKeyboardToken = (token) => {
            if (!token) return;
            keyboardQueue.push(token);
            processKeyboardQueue();
        };

        const mapKeyboardInput = (event) => {
            const key = event.key;
            if (/^[0-9]$/.test(key)) return key;
            if (key === ".") return ".";
            if (key === "+") return "+";
            if (key === "-") return "−";
            if (key === "*") return "×";
            if (key === "/") return "÷";
            if (key === "%") return "%";
            if (key === "(") return "(";
            if (key === ")") return ")";
            if (key === "Enter" || key === "=") return "=";
            if (key === "Backspace") return "DEL";
            if (key === "Escape") return "AC";
            return null;
        };

        const onKeyboardInput = (event) => {
            if (!container.isConnected || activeWindowId !== appId) return;
            if (event.target && (event.target.matches("input, textarea, [contenteditable='true']") || event.target.isContentEditable)) return;
            const token = mapKeyboardInput(event);
            if (!token) return;
            event.preventDefault();
            enqueueKeyboardToken(token);
        };

        keys.forEach((button) => {
            button.addEventListener("click", () => {
                const token = button.getAttribute("data-calc-key");

                if (token === "UNDO" || token === "DEL") {
                    if (justEvaluated) {
                        justEvaluated = false;
                    }
                    tokens.pop();
                    resultValue = "";
                } else if (token === "AC") {
                    tokens = [];
                    resultValue = "";
                    justEvaluated = false;
                } else if (token === "=") {
                    const expression = normalizeExpression(getEvalText());
                    resultValue = evaluateCalculation(expression);
                    tokens = [{ display: resultValue, eval: resultValue }];
                    justEvaluated = true;
                } else {
                    pushToken(token);
                }

                renderDisplay();
            });
        });

        document.addEventListener("keydown", onKeyboardInput);

        windowActionButtons.forEach((button) => {
            button.addEventListener("click", () => {
                const action = button.getAttribute("data-window-action");
                if (action === "close") {
                    hideWindow(appId, false);
                } else if (action === "minimize") {
                    hideWindow(appId, true);
                } else if (action === "maximize") {
                    toggleMaximize(appId);
                }
            });
        });

        renderDisplay();
    }

            ? window.crypto.randomUUID()
            : "tab-" + Date.now() + "-" + Math.random().toString(16).slice(2);
        return {
            id: tabId,
            page: nextPage,
            history: [nextPage],
            historyIndex: 0
        };
    }

    function getBrowserState(body) {
        const pages = getBrowserPages();
        let state;
        try {
            state = JSON.parse(body.dataset.browserState || "null");
        } catch (error) {
            state = null;
        }

        if (!state || !Array.isArray(state.tabs) || state.tabs.length === 0) {
            const defaultTab = createBrowserTab("projects");
            state = {
                tabs: [defaultTab],
                activeTabId: defaultTab.id
            };
        }

        state.tabs = state.tabs.map((tab) => {
            const nextPage = pages[tab.page] ? tab.page : "blank";
            return {
                id: tab.id || createBrowserTab(nextPage).id,
                page: nextPage,
                history: Array.isArray(tab.history) && tab.history.length ? tab.history.filter((pageId) => pages[pageId]) : [nextPage],
                historyIndex: Math.max(0, Math.min(Number(tab.historyIndex || 0), (Array.isArray(tab.history) ? tab.history.length : 1) - 1))
            };
        });

        const activeExists = state.tabs.some((tab) => tab.id === state.activeTabId);
        if (!activeExists) {
            state.activeTabId = state.tabs[0].id;
        }

        body.dataset.browserState = JSON.stringify(state);
        return state;
    }

    function setBrowserState(body, state) {
        body.dataset.browserState = JSON.stringify(state);

    function triggerBrowserAddressLoading(body) {
        if (!body) return;
        const address = body.querySelector("[data-browser-address]");
        if (!address) return;

        let loadingBar = body.querySelector("[data-browser-loading]");
        if (!loadingBar) {
            loadingBar = document.createElement("span");
            loadingBar.className = "browser-address__loading";
            loadingBar.setAttribute("data-browser-loading", "");
            loadingBar.setAttribute("aria-hidden", "true");
            address.parentElement?.appendChild(loadingBar);
        }

        if (body.__browserAddressLoadingTimer) {
            clearTimeout(body.__browserAddressLoadingTimer);
            body.__browserAddressLoadingTimer = 0;
        }

        loadingBar.classList.remove("is-active");
        void loadingBar.offsetWidth;
        loadingBar.classList.add("is-active");

    function renderBrowserTabs(body, titleEl) {
        const tabsContainer = body.querySelector("[data-browser-tabs]");
        if (!tabsContainer) return;

        const state = getBrowserState(body);
        const activeTab = getActiveBrowserTab(state);
        const pages = getBrowserPages();

        tabsContainer.innerHTML = state.tabs.map((tab) => {
            const page = pages[tab.page] || pages.blank;
            const isActive = tab.id === activeTab.id;
            return [
                "<div class='browser-tab" + (isActive ? " is-active" : "") + "' data-browser-tab='" + tab.id + "'>",
                "  <img class='browser-logo' src='assets/firefox_logo.png' alt='' />",
                "  <span class='browser-tab__title'>" + (page ? page.title : getBrowserTabTitle(tab.page)) + "</span>",
                "  <button class='browser-tab__close' type='button' data-browser-tab-close='" + tab.id + "' aria-label='Close tab'>×</button>",
                "</div>"
            ].join("");
        }).join("");

        if (titleEl) {
            const currentPage = pages[activeTab.page] || pages.blank;
            titleEl.textContent = "Firefox Browser - " + currentPage.title;
        }
    }

    function activateBrowserTab(body, titleEl, tabId) {
        const state = getBrowserState(body);
        const targetTab = state.tabs.find((tab) => tab.id === tabId);
        if (!targetTab) return;

        state.activeTabId = tabId;
        setBrowserState(body, state);
        updateBrowserPage(body, titleEl, targetTab.page, { pushHistory: false });
    }

    function addBrowserTab(body, titleEl, pageId) {
        const state = getBrowserState(body);
        const newTab = createBrowserTab(pageId || "blank");
        state.tabs.push(newTab);
        state.activeTabId = newTab.id;
        setBrowserState(body, state);
        renderBrowserTabs(body, titleEl);
        updateBrowserPage(body, titleEl, newTab.page, { pushHistory: false });
    }

    function closeBrowserTab(body, titleEl, tabId) {
        const state = getBrowserState(body);
        if (state.tabs.length <= 1) {
            state.tabs = [createBrowserTab("blank")];
            state.activeTabId = state.tabs[0].id;
            setBrowserState(body, state);
            renderBrowserTabs(body, titleEl);
            updateBrowserPage(body, titleEl, "blank", { pushHistory: false });
            return;
        }

        const tabIndex = state.tabs.findIndex((tab) => tab.id === tabId);
        if (tabIndex < 0) return;

        const wasActive = state.activeTabId === tabId;
        state.tabs.splice(tabIndex, 1);
        if (wasActive) {
            const nextTab = state.tabs[Math.max(0, tabIndex - 1)] || state.tabs[0];
            state.activeTabId = nextTab.id;
        }
        setBrowserState(body, state);
        renderBrowserTabs(body, titleEl);

        const activeTab = getActiveBrowserTab(state);
        updateBrowserPage(body, titleEl, activeTab.page, { pushHistory: false });
    }

    function navigateBrowserTab(body, titleEl, direction) {
        const state = getBrowserState(body);
        const tab = getActiveBrowserTab(state);
        if (!tab) return;

        if (direction === "back" && tab.historyIndex > 0) {
            tab.historyIndex -= 1;
            tab.page = tab.history[tab.historyIndex];
        } else if (direction === "forward" && tab.historyIndex < tab.history.length - 1) {
            tab.historyIndex += 1;
            tab.page = tab.history[tab.historyIndex];
        } else if (direction === "reload") {
            tab.page = tab.history[tab.historyIndex] || tab.page;
        }

        setBrowserState(body, state);
        renderBrowserTabs(body, titleEl);
        updateBrowserPage(body, titleEl, tab.page, { pushHistory: false });
    }

        body.dataset.browserState = JSON.stringify({

            activeTabId: null

        initialState.activeTabId = initialState.tabs[0].id;
        setBrowserState(body, initialState);

        const tabsContainer = body.querySelector("[data-browser-tabs]");
        const plusButton = body.querySelector("[data-browser-action='new-tab']");

        if (tabsContainer) {
            tabsContainer.addEventListener("click", (event) => {
                const closeButton = event.target.closest("[data-browser-tab-close]");
                if (closeButton) {
                    closeBrowserTab(body, titleEl, closeButton.getAttribute("data-browser-tab-close"));
                    return;
                }

                const tabButton = event.target.closest("[data-browser-tab]");
                if (tabButton) {
                    activateBrowserTab(body, titleEl, tabButton.getAttribute("data-browser-tab"));
                }
            });
        }

        if (plusButton) {
            plusButton.addEventListener("click", () => {
                addBrowserTab(body, titleEl, "blank");
            });
        }

        body.querySelectorAll("[data-browser-page]").forEach((link) => {
            link.addEventListener("click", () => {
                updateBrowserPage(body, titleEl, link.getAttribute("data-browser-page"), { pushHistory: true });
            });
        });

        body.querySelectorAll("[data-browser-action]").forEach((button) => {
            button.addEventListener("click", () => {
                const action = button.getAttribute("data-browser-action");
                if (action === "new-tab") {
                    return;
                }
                if (action === "back" || action === "forward" || action === "reload") {
                    navigateBrowserTab(body, titleEl, action);
                }
            });
        });

        renderBrowserTabs(body, titleEl);
        updateBrowserPage(body, titleEl, initialPage, { pushHistory: true });
    }

    function openApp(appId) {
        if (bootOpen || lockOpen) return;

        const app = apps.find((item) => item.id === appId);
        if (!app) return;

        if (app.id === "calculator") {
            openCalculatorWindow();
            return;
        }

        closeOverview();
        closeSystemMenu();
        closeCalendarMenu();

        const record = windowRegistry.get(appId);
        if (!record) {
            createWindow(app);
        } else {
            record.window.classList.remove("is-hidden", "is-minimized");
            bringToFront(record.window, appId);
            if (app.kind === "terminal") {
                focusTerminalInput(record.window);
            } else if (app.kind === "music") {
                const searchInput = record.window.querySelector("[data-rhythmbox-search]");
                if (searchInput) {
                    searchInput.focus();
                }
            } else if (app.kind === "editor") {
                const textarea = record.window.querySelector(".gedit-textarea");
                if (textarea) {
                    textarea.focus();
                }
            } else if (app.kind === "mail") {
                const editor = record.window.querySelector("[data-mail-editor]");
                if (editor) {
                    editor.focus();
                }
            }
        }

        syncDockState();
    }

    function getOverviewSnapshotSource() {
        if (desktopShell) {
            return {
                kind: "shell",
                sourceEl: desktopShell,
                sourceRect: desktopShell.getBoundingClientRect()
            };
        }

        return null;
    }

    function stripClonedIds(node) {
        if (!node) return;
        if (node.removeAttribute) {
            node.removeAttribute("id");
        }
        if (node.querySelectorAll) {
            node.querySelectorAll("[id]").forEach((child) => child.removeAttribute("id"));
        }
    }

    function getOverviewTargetScale(sourceRect) {
        const rootStyles = window.getComputedStyle(document.documentElement);
        const topBarHeight = parseFloat(rootStyles.getPropertyValue("--topbar-height")) || 48;
        const dockWidth = parseFloat(rootStyles.getPropertyValue("--dock-width")) || 88;
        const availableWidth = Math.max(320, window.innerWidth - dockWidth - 48);
        const availableHeight = Math.max(180, window.innerHeight - topBarHeight - 300);
        const sourceWidth = Math.max(1, sourceRect.width);
        const sourceHeight = Math.max(1, sourceRect.height);
        return Math.max(0.22, Math.min(0.34, availableWidth / sourceWidth, availableHeight / sourceHeight));
    }

    function openOverviewPreview() {
        const snapshotSource = pendingOverviewSnapshot || getOverviewSnapshotSource();
        if (!snapshotSource || !snapshotSource.sourceEl) return;

    const { kind, sourceEl, sourceRect } = snapshotSource;
    const targetScale = getOverviewTargetScale(sourceRect);

    function waitForImageLoad(imageElement) {
        if (!imageElement) return Promise.resolve();
        if (imageElement.complete && imageElement.naturalWidth > 0) {
            return Promise.resolve();
        }

        return new Promise((resolve) => {
            const handleComplete = () => {
                imageElement.removeEventListener("load", handleComplete);
                imageElement.removeEventListener("error", handleComplete);
                resolve();
            };

            imageElement.addEventListener("load", handleComplete, { once: true });
            imageElement.addEventListener("error", handleComplete, { once: true });
        });
    }

    function getAnimatedImageDurationMs(source, fallbackMs) {
        const cachedDuration = animatedImageDurationCache.get(source);
        if (cachedDuration) {
            return cachedDuration;
        }

        const durationPromise = (async () => {
            if (!window.ImageDecoder || !window.fetch) {
                return fallbackMs;
            }

            try {
                const response = await fetch(source, { cache: "no-store" });
                if (!response.ok) {
                    return fallbackMs;
                }

                const blob = await response.blob();
                const decoder = new ImageDecoder({ data: blob, type: blob.type || "image/gif" });
                await decoder.tracks.ready;

                const track = decoder.tracks.selectedTrack;
                const frameCount = Math.max(1, track?.frameCount || 1);
                let totalDurationMs = 0;

                for (let frameIndex = 0; frameIndex < frameCount; frameIndex += 1) {
                    const { image } = await decoder.decode({ frameIndex });
                    totalDurationMs += Math.max(0, Math.round((image.duration || 0) / 1000));
                    if (typeof image.close === "function") {
                        image.close();
                    }
                }

                if (typeof decoder.close === "function") {
                    decoder.close();
                }

                return totalDurationMs > 0 ? totalDurationMs : fallbackMs;
            } catch (error) {
                return fallbackMs;
            }
        })();

        animatedImageDurationCache.set(source, durationPromise);
        return durationPromise;
    }

    function finishBootSequence() {
        if (!bootOpen) return;

        clearBootTimers();
        setBootPhase("bios");
        if (bootScreenImage) {
            bootScreenImage.classList.remove("is-visible");
            bootScreenImage.onload = null;

            bootScreenImage.removeAttribute("src");

        bootLockTimer = window.setTimeout(() => {

    function playBootAnimationOnce(bootSource, durationMs, onComplete) {
        if (!bootScreenImage) return false;
        let completionScheduled = false;

        const scheduleBootCompletion = () => {
            if (!bootOpen || completionScheduled) return;
            completionScheduled = true;
            if (bootCompleteTimer) {
                window.clearTimeout(bootCompleteTimer);
            }
            bootCompleteTimer = window.setTimeout(() => {
                bootCompleteTimer = null;
                if (typeof onComplete === "function") {
                    onComplete();
                }
            }, durationMs);
        };

        bootScreenImage.classList.add("is-visible");
        bootScreenImage.onload = () => {
            scheduleBootCompletion();
        };
        bootScreenImage.onerror = () => {
            if (typeof onComplete === "function") {
                onComplete();
            }
        };
        bootScreenImage.src = bootSource + "?v=" + Date.now();

        if (bootScreenImage.complete && bootScreenImage.naturalWidth > 0) {
            scheduleBootCompletion();
        }

        return true;
    }

    function beginBootSequence() {
        const currentBootToken = ++bootSequenceToken;
        const biosBootSource = "assets/bios_boot.gif";

        clearBootTimers();
        setBootScreenOpen(true, { immediate: true });
        setBootPhase("bios");
        if (bootScreenImage) {
            bootScreenImage.classList.add("is-visible");
            bootScreenImage.onload = null;
            bootScreenImage.onerror = null;
            bootScreenImage.src = biosBootSource + "?v=" + Date.now();
        }

        const launchBootGif = () => {
            if (!bootOpen) return;
            setBootPhase("boot");
            if (!playBootAnimationOnce("assets/boot.gif", bootGifDurationMs, finishBootSequence) && bootOpen) {
                finishBootSequence();
            }
        };

        void Promise.all([
            waitForImageLoad(bootScreenImage),
            getAnimatedImageDurationMs(biosBootSource, bootBiosFallbackDurationMs)
        ]).then(([, biosDurationMs]) => {
            if (currentBootToken !== bootSequenceToken || !bootOpen) return;
            bootBlackTimer = window.setTimeout(launchBootGif, biosDurationMs);
        });
    }

    function markStartupSoundPlayed() {

    function playStartupSoundOnce() {

        if (startupSoundPlayed || !window.Audio) return;

        if (!startupSoundAudio) {
            startupSoundAudio = new Audio("assets/ubuntu-start-sound.mp3");
            startupSoundAudio.preload = "auto";
            startupSoundAudio.volume = 0.85;
        }

        startupSoundAudio.currentTime = 0;
        const maybePromise = startupSoundAudio.play();
        if (maybePromise && typeof maybePromise.then === "function") {
            maybePromise.then(() => {
                markStartupSoundPlayed();
            }).catch(() => {});
        } else {
            markStartupSoundPlayed();
        }
    }

        lockScreenFailedAttempts += 1;

    function buildDock() {
        if (!dockApps) return;

        dockApps.innerHTML = "";
        apps.filter((app) => isAppFavorited(app.id)).forEach((app) => {
            const item = document.createElement("div");
            item.className = "dock-item";
            item.setAttribute("data-app-id", app.id);
            const button = document.createElement("button");
            button.className = "dock-item__button";
            button.type = "button";
            button.setAttribute("aria-label", app.label);

            const icon = document.createElement("span");
            icon.className = "dock-item__icon" + (app.iconClass ? " " + app.iconClass : "");
            icon.style.setProperty("--icon-bg", app.iconBg);

            if (app.iconImage) {
                const iconImage = document.createElement("img");
                iconImage.className = "dock-item__icon-image";
                iconImage.src = app.iconImage;
                iconImage.alt = "";
                icon.appendChild(iconImage);
            } else if (app.iconSvg) {
                icon.innerHTML = app.iconSvg;
            } else {
                icon.textContent = app.icon;
            }

            const tooltip = document.createElement("span");
            tooltip.className = "dock-item__tooltip";
            tooltip.textContent = app.label;

            button.appendChild(icon);
            button.addEventListener("click", () => openApp(app.id));
            button.addEventListener("contextmenu", (event) => {
                event.preventDefault();
                event.stopPropagation();
                const rect = button.getBoundingClientRect();
                openFavoritesMenu(app, rect, {
                    offsetX: event.clientX - rect.left,
                    offsetY: event.clientY - rect.top
                });
            });

            item.appendChild(button);
            item.appendChild(tooltip);
            dockApps.appendChild(item);
        });
    }

            const dayButton = event.target.closest("[data-calendar-date]");
            if (dayButton) {
                const pickedDate = new Date(dayButton.getAttribute("data-calendar-date"));
                if (!Number.isNaN(pickedDate.getTime())) {
                    selectCalendarDate(pickedDate.getFullYear(), pickedDate.getMonth(), pickedDate.getDate());
                }
                return;
            }

            const mediaButton = event.target.closest("[data-calendar-media-action]");
            if (!mediaButton) return;
            const playback = getRhythmboxPlaybackSnapshot();
            if (!playback) return;
            const action = mediaButton.getAttribute("data-calendar-media-action");
            const state = playback.state;

            if (action === "prev") {
                playRhythmboxRelativeTrack(state, -1);
            } else if (action === "next") {
                playRhythmboxRelativeTrack(state, 1);
            } else if (action === "play") {
                if (state.audio && !state.audio.paused) {
                    state.audio.pause();
                } else if (state.audio) {
                    state.audio.play();
                }
            }
        });
    }

    if (appOverviewSearch) {
        appOverviewSearch.addEventListener("input", (event) => {
            filterOverviewApps(event.target.value);
        });
    }

    if (systemVolume) {
        updateVolumeSlider(systemVolume.value);
        systemVolume.addEventListener("input", (event) => {
            syncRhythmboxOpenInstancesVolume(event.target.value);
        });
    }

    if (lockScreenToggle) {
        lockScreenToggle.addEventListener("click", () => {
            const nextShow = lockScreenPassword && lockScreenPassword.type === "password";
            setPasswordVisibility(nextShow);
        });
    }

    if (lockScreenPassword) {
        lockScreenPassword.addEventListener("input", () => {
            lockScreenPassword.setAttribute("aria-invalid", "false");
            lockScreenPassword.placeholder = "Password";
        });
        lockScreenPassword.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                attemptUnlock();
            }
        });
    }

    if (lockScreen) {
        lockScreen.addEventListener("click", (event) => {
            if (event.target === lockScreen) {
                if (lockScreenPassword) lockScreenPassword.focus();
            }
        });
    }

    if (bootScreen) {
        bootScreen.addEventListener("click", (event) => {
            event.preventDefault();
        });
    }

    if (restartModalCancelButton) {
        restartModalCancelButton.addEventListener("click", () => {
            closeRestartModal();
        });
    }

    if (restartModalRestartButton) {
        restartModalRestartButton.addEventListener("click", () => {
            startRestartSequence();
        });
    }

    document.addEventListener("click", (event) => {
        if (bootOpen || lockOpen) {
            return;
        }
        const openLightboxButton = event.target.closest("[data-project-image-open]");
        if (openLightboxButton) {
            openProjectLightbox(
                openLightboxButton.getAttribute("data-project-image-src"),
                openLightboxButton.getAttribute("data-project-image-title") || "Project preview"
            );
            return;
        }
        if (projectLightboxOpen) {
            if (event.target.closest("[data-project-lightbox-close]")) {
                closeProjectLightbox();
                return;
            }
            if (event.target === projectLightbox) {
                closeProjectLightbox();
            }
        }
    });

    document.addEventListener("click", (event) => {
        if (bootOpen || lockOpen) {
            return;
        }
        if (event.target.closest("#app-overview, #app-menu-button")) {
            return;
        }
        if (event.target.closest("#favorites-menu")) {
            return;
        }
        if (event.target.closest("#calendar-menu, #system-time")) {
            return;
        }
        if (event.target.closest("#system-menu, #system-menu-button")) {
            return;
        }
        if (overviewOpen) {
            closeOverview();
        }
        closeFavoritesMenu();
        if (calendarMenuOpen) {
            closeCalendarMenu();
        }
        if (systemMenuOpen) {
            closeSystemMenu();
        }
    });

    document.addEventListener("contextmenu", (event) => {
        if (event.target.closest("#app-overview, #app-menu-button, #favorites-menu, #calendar-menu, #system-time, #system-menu, #system-menu-button")) {
            return;
        }
        closeFavoritesMenu();
    });

    document.addEventListener("click", (event) => {
        if (bootOpen) {
            return;
        }
        const lockAction = event.target.closest("[data-system-action='lock']");
        if (lockAction) {
            openLockScreen();
            return;
        }
        const logoutAction = event.target.closest("[data-system-action='log-out']");
        if (logoutAction) {
            closeSystemMenu();
            openLockScreen();
            return;
        }
        const powerOffAction = event.target.closest("[data-system-action='power-off']");
        if (powerOffAction) {
            closeSystemMenu();
            openRestartModal();
            return;
        }
        if (restartModalOpen && event.target === restartModal) {
            closeRestartModal();
            return;
        }
    });

    document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
            if (projectLightboxOpen) {
                closeProjectLightbox();
                return;
            }
            if (restartModalOpen) {
                closeRestartModal();
                return;
            }
            if (overviewOpen) closeOverview();
            closeFavoritesMenu();
            if (calendarMenuOpen) closeCalendarMenu();
            if (systemMenuOpen) closeSystemMenu();
        }
    });

    function handleResize() {
        if (window.innerWidth <= 980) {
            windowRegistry.forEach((record) => {
                record.window.style.left = "";
                record.window.style.top = "";
                record.window.style.width = "";
                record.window.style.height = "";
            });
            return;
        }

        windowRegistry.forEach((record) => {
            if (record.app && record.app.id === "calculator" && record.window.classList.contains("calculator-window--overlay")) {
                return;
            }
            if (!record.window.classList.contains("is-maximized")) {
                positionWindow(record.window, record.app);
            }
        });
    }

    buildDock();
    buildDesktopShortcuts();
    buildOverview();
    updateSystemTime();
    setInterval(updateSystemTime, 60000);
    window.addEventListener("resize", handleResize);
    const params = new URLSearchParams(window.location.search);
    const debugOpenApp = params.get("debugOpenApp");
    if (debugOpenApp && apps.some((app) => app.id === debugOpenApp)) {
        openApp(debugOpenApp);
    }

    startBootSequence();
});
</script>
</body>
</html>
