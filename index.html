:root {
    --matrix-green: #85e67b;

}

body {
    font-family: 'Source Code Pro', monospace;
    background-color: #000;
    color: var(--matrix-green);
    overflow-x: hidden;
}

.terminal {
    background-color: var(--terminal-bg);

    border-radius: 5px;
    box-shadow: 0 0 20px rgba(32, 194, 14, 0.2);
    margin: 0 auto;
}

.terminal-header {
    background-color: #111;
    border-bottom: 1px solid #333;
}

.terminal-body {
    height: 600px;  /* Keep taller terminal */
    overflow-y: auto;
    padding: 15px;
}

.command-line {
    display: flex;
    align-items: center;
    margin-bottom: 5px;
}

.prompt {
    color: var(--matrix-green);
    margin-right: 5px;
}

.terminal-input {
    color: white !important;
    background-color: transparent;
    border: none;
    outline: none;
    flex: 1;
    caret-color: var(--matrix-green);
}

.echo-command { color: white; }

.response { margin-left: 20px; margin-bottom: 3px; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: var(--matrix-green); border-radius: 4px; }

</style>

    const commandMeta = {
        cat: { fileArgIndex: 1 },
        head: { fileArgIndex: 1 },
        tail: { fileArgIndex: 1 },
        wc: { fileArgIndex: 1 },
        grep: { fileArgIndex: 2 }
    };

    /* ---------------- COMMANDS ---------------- */
    const commands = {
        exit: () => [
            "<span style='color:yellow;'>Bye, bye!</span>",
        ],

        ls: () => Object.keys(fileSystem),

        l: () => Object.keys(fileSystem),

        help: () => [
            "<span style='color:yellow;'>Available commands:</span>",
            "ls / l            - list files",
            "cat <file>        - view a file",
            "clear             - clear terminal screen",
            "history           - show command history",
            "head <file>       - first 5 lines",
            "tail <file>       - last 5 lines",
            "wc <file>         - word count",
            "grep <term> file  - search in file / grep <term> .",
            "open github       - open my GitHub",
            "whoami            - about me",
        ],

        clear: () => {
            terminalOutput.innerHTML = '';
            return [];
        },

        cat: (args) => {
            const file = args[0];
            if (!file) return ["Usage: <span style='color:white;'>cat filename</span>"];
            if (!fileSystem[file]) return [`cat: ${file}: No such file`];
            return fileSystem[file].split("\n");
        },

        pwd: () => ["/home/tejas"],

        echo: (args) => [args.join(" ")],

        date: () => [new Date().toString()],

        uname: () => ["Linux tejas-portfolio 5.15.0-portfolio x86_64 GNU/Linux"],

        history: () => history.map((cmd, i) => `${i + 1}  ${cmd}`),

        head: (args) => {
            const file = args[0];
            if (!file || !fileSystem[file]) return ["Usage: <span style='color:white;'>head filename</span>"];
            return fileSystem[file].split("\n").slice(0, 5);
        },

        tail: (args) => {
            const file = args[0];
            if (!file || !fileSystem[file]) return ["Usage: <span style='color:white;'>tail filename</span>"];
            const lines = fileSystem[file].split("\n");
            return lines.slice(-5);
        },

        wc: (args) => {
            const file = args[0];
            if (!file || !fileSystem[file]) return ["Usage: <span style='color:white;'>wc filename</span>"];

            const text = fileSystem[file];
            const lines = text.split("\n").length;
            const words = text.split(/\s+/).filter(Boolean).length;
            const chars = text.length;

            return [`${lines} ${words} ${chars} ${file}`];
        },

        grep: (args) => {
            const term = args[0];
            const file = args[1];

            if (!term || !file || !fileSystem[file]) {
                return ["Usage: <span style='color:white;'>grep search-term filename</span>"];
            }

            return fileSystem[file]
                .split("\n")
                .filter(line => line.toLowerCase().includes(term.toLowerCase()));
        },

        open: (args) => {
            const target = args[0];

            if (target === "github") {
                window.open("https://github.com/tejasashinde", "_blank");
                return ["Opening GitHub..."];
            }

            if (target === "huggingface") {

"&nbsp;&nbsp;  в–Ҳв–Ҳв•‘   &nbsp;&nbsp;в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;       в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—",
"&nbsp;&nbsp;   в–Ҳв–Ҳв•‘  &nbsp;&nbsp;в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳ   &nbsp;&nbsp;&nbsp;в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘",
"&nbsp;&nbsp;   в–Ҳв–Ҳв•‘  &nbsp;&nbsp;в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  &nbsp;в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘",
"&nbsp;&nbsp;   в•ҡв•җв•қ   &nbsp;&nbsp;в•ҡв•җв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қ",
"<span style='color:yellow;'>рҹ‘Ӣ Hello, I'm Tejas Shinde</span>",
"- PHP Developer with 4+ years of experience building scalable web applications using Laravel and CakePHP frameworks.",
"- Currently expanding into Python, focusing on AI-driven applications and practical real-world tools"
        ],

    function runSingleCommand(cmdLine) {
        const parts = cmdLine.trim().split(" ");
        const baseCmd = parts[0];
        const args = parts.slice(1);

        if (commands[baseCmd]) {
            return commands[baseCmd](args);
        } else {
            return [`bash: ${baseCmd}: command not found`];
        }
    }

    /* ---------------- HISTORY ---------------- */
    let history = [];
    let historyIndex = -1;

    /* ---------------- AUTOCOMPLETE ---------------- */
    const getAllTokens = () => [
        ...Object.keys(commands),
        ...Object.keys(fileSystem)
    ];

    const findMatches = (token, mode = "any") => {
        const commandsList = Object.keys(commands);
        const filesList = Object.keys(fileSystem);

        let pool = [];

        if (mode === "command") pool = commandsList;
        else if (mode === "file") pool = filesList;
        else pool = [...commandsList, ...filesList];

        return pool.filter(item =>
            item.toLowerCase().startsWith(token.toLowerCase())
        );
    };

    /* ---------------- INPUT LINE ---------------- */
    const createInputLine = () => {
        const line = document.createElement('div');
        line.className = 'command-line';
        line.innerHTML = `
            <span class="prompt">tejas@portfolio:~$</span>
            <input type="text" class="terminal-input"
                placeholder="Type 'help'..."
                autocomplete="off" autofocus />
        `;

        terminalOutput.appendChild(line);

        const input = line.querySelector('input');
        input.focus();

        const fileCommands = new Set([
            "cat",
            "head",
            "tail",
            "wc",
            "grep"
        ]);

        input.addEventListener('keydown', (e) => {

            if (e.key === 'Tab') e.preventDefault();

            /* ENTER */
            if (e.key === 'Enter') {
                handleCommand(input.value.trim(), line);
            }

            /* HISTORY UP */
            else if (e.key === 'ArrowUp') {
                if (history.length && historyIndex > 0) {
                    input.value = history[--historyIndex];
                }
            }

            /* HISTORY DOWN */
            else if (e.key === 'ArrowDown') {
                if (history.length && historyIndex < history.length - 1) {
                    input.value = history[++historyIndex];
                } else {
                    input.value = '';
                }
            }

            /* Ctrl+l - CLEAR TERMINAL */
            if (e.ctrlKey && e.key.toLowerCase() === 'l') {
                e.preventDefault();
                commands.clear();
                createInputLine();
                return;
            }

            /* TAB AUTOCOMPLETE */
            else if (e.key === 'Tab') {
                e.preventDefault();
                e.stopPropagation();

                const value = input.value.trim();
                if (!value) return;

                const parts = value.split(" ");
                const command = parts[0];
                const lastToken = parts[parts.length - 1];

                const isFirstToken = parts.length === 1;

                let mode = "none";

                if (isFirstToken) {
                    mode = "command";
                }
                else if (commandMeta[command]) {

                    const expectedIndex = commandMeta[command].fileArgIndex;

                    // parts.length - 1 = current argument position
                    if (parts.length - 1 === expectedIndex) {
                        mode = "file";
                    } else {
                        return;
                    }
                }
                else {
                    return;
                }

                const matches = findMatches(lastToken, mode);

                if (matches.length === 1) {
                    parts[parts.length - 1] = matches[0];
                    input.value = parts.join(" ") + " ";
                    return;
                }

                if (matches.length > 1) {

                    const echoLine = document.createElement('div');
                    echoLine.className = 'command-line echo-command';
                    echoLine.innerHTML = `<span class="prompt">${getPrompt()}</span> ${value}`;

                    terminalOutput.replaceChild(echoLine, line);

                    const suggestionLine = document.createElement('div');
                    suggestionLine.className = 'command-line';

                    suggestionLine.innerHTML = `
                        <span class="prompt"></span>
                        <pre style="
                            color:#999;
                            margin:0;
                            font-family: 'Source Code Pro', monospace;
                            white-space: pre;
                        ">${matches.join('   ')}</pre>
                    `;

                    terminalOutput.appendChild(suggestionLine);

                    createInputLine();

                    requestAnimationFrame(() => {
                        terminalOutput.scrollTop = terminalOutput.scrollHeight;
                    });

                    return;
                }
            }
        });
    };

    const getPrompt = () => "tejas@portfolio:~$";

    /* ---------------- COMMAND HANDLER ---------------- */
    const handleCommand = (cmd, lineElement) => {
        const input = lineElement.querySelector('input');
        input.disabled = true;

        const echo = document.createElement('div');
        echo.className = 'command-line echo-command';
        echo.innerHTML = `<span class="prompt">${getPrompt()}</span> ${cmd}`;
        terminalOutput.replaceChild(echo, lineElement);

        if (cmd) {
            history.push(cmd);
            historyIndex = history.length;
        }

        // SPLIT BY &&
        const pipeline = cmd.split("&&").map(c => c.trim()).filter(Boolean);

        let lastOutput = [];

        for (let i = 0; i < pipeline.length; i++) {
            const result = runSingleCommand(pipeline[i]);

            // print output immediately
            result.forEach(text => {
                const resp = document.createElement('div');
                resp.className = 'response';
                resp.innerHTML = `<p>${text}</p>`;
                terminalOutput.appendChild(resp);
            });

            lastOutput = result;
        }
        createInputLine();
        requestAnimationFrame(() => {
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        });
    };

    /* ---------------- BOOT ---------------- */
    const welcome = document.createElement('div');
    welcome.className = 'response';
    welcome.innerHTML = `<p style="color: yellow;">Welcome! YouвҖҷve entered my terminal playground.</p>`;

    terminalOutput.appendChild(welcome);

    createInputLine();
});
</script>
