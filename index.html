            tabButtons: Array.from(container.querySelectorAll("[data-rhythmbox-tab]")),
            sidebarButtons: Array.from(container.querySelectorAll("[data-rhythmbox-source]"))
        };

        container.__rhythmboxState = state;

        if (state.audio) {
            state.audio.volume = sharedRhythmboxVolume / 100;
            state.audio.addEventListener("timeupdate", () => {
                syncRhythmboxTransport(state);
            });
            state.audio.addEventListener("loadedmetadata", () => {
                syncRhythmboxTransport(state);
            });
            state.audio.addEventListener("play", () => {
                state.isPlaying = true;
                syncRhythmboxNowPlaying(state);
            });
            state.audio.addEventListener("pause", () => {
                state.isPlaying = false;
                syncRhythmboxNowPlaying(state);
            });
            state.audio.addEventListener("ended", () => {
                playRhythmboxRelativeTrack(state, 1);
            });
            state.audio.addEventListener("error", () => {
                const currentTrack = state.currentTrackId ? rhythmboxTrackLibrary.find((track) => track.id === state.currentTrackId) : null;
                state.isPlaying = false;
                syncRhythmboxNowPlaying(state);
                syncRhythmboxTransport(state);
                if (currentTrack) {
                showRhythmboxMessage(state, "Unable to load \"" + currentTrack.title + "\".");
                } else {
                    showRhythmboxMessage(state, "Unable to load audio.");
                }
            });
        }

        if (state.searchInput) {
            state.searchInput.addEventListener("input", () => {
                state.searchQuery = state.searchInput.value || "";
                renderRhythmboxLibrary(state);
            });
        }

        if (state.progressInput) {
            state.progressInput.addEventListener("input", () => {
                updateRhythmboxRangeFill(state.progressInput);
                if (!state.audio || !Number.isFinite(state.audio.duration) || state.audio.duration <= 0) return;
                state.audio.currentTime = (Number(state.progressInput.value || 0) / 1000) * state.audio.duration;
            });
        }

        if (state.volumeInput) {
            state.volumeInput.value = String(sharedRhythmboxVolume);
            updateRhythmboxRangeFill(state.volumeInput);
            state.volumeInput.addEventListener("input", () => {
                syncRhythmboxOpenInstancesVolume(state.volumeInput.value, state);
            });
        }

        if (state.tableBody) {
            state.tableBody.addEventListener("click", (event) => {
                const row = event.target.closest("[data-rhythmbox-track]");
                if (!row || !state.tableBody.contains(row)) return;
                setRhythmboxSelectedTrack(state, row.getAttribute("data-rhythmbox-track"));
            });
            state.tableBody.addEventListener("dblclick", (event) => {
                const row = event.target.closest("[data-rhythmbox-track]");
                if (!row || !state.tableBody.contains(row)) return;
                playRhythmboxTrack(state, row.getAttribute("data-rhythmbox-track"));
            });
        }

        container.addEventListener("click", (event) => {
            const browserButton = event.target.closest("[data-rhythmbox-browser]");
            if (browserButton && container.contains(browserButton)) {
                const browserType = browserButton.getAttribute("data-rhythmbox-browser");
                const browserValue = browserButton.getAttribute("data-rhythmbox-value") || "";
                if (browserType === "artist") {
                    state.selectedArtist = browserValue;
                } else if (browserType === "album") {
                    state.selectedAlbum = browserValue;
                }
                renderRhythmboxLibrary(state);
                return;
            }

            const sourceButton = event.target.closest("[data-rhythmbox-source]");
            if (sourceButton && container.contains(sourceButton)) {
                state.activeSource = sourceButton.getAttribute("data-rhythmbox-source") || "library";
                state.selectedArtist = "";
                state.selectedAlbum = "";
                renderRhythmboxLibrary(state);
                return;
            }

            const actionButton = event.target.closest("[data-rhythmbox-action]");
            if (!actionButton || !container.contains(actionButton)) return;
            const action = actionButton.getAttribute("data-rhythmbox-action");
            const selectedTrack = state.selectedTrackId ? rhythmboxTrackLibrary.find((track) => track.id === state.selectedTrackId) : null;

            if (action === "play") {
                if (!state.currentTrackId && selectedTrack) {
                    playRhythmboxTrack(state, selectedTrack.id);
                    return;
                }
                if (state.audio && !state.audio.paused) {
                    state.audio.pause();
                } else if (selectedTrack) {
                    playRhythmboxTrack(state, selectedTrack.id);
                } else if (state.visibleTracks.length) {
                    playRhythmboxTrack(state, state.visibleTracks[0].id);
                }
            } else if (action === "prev") {
                playRhythmboxRelativeTrack(state, -1);
            } else if (action === "next") {
                playRhythmboxRelativeTrack(state, 1);
            }
        });

        const initialTracks = getRhythmboxVisibleTracks(state);
        state.selectedTrackId = initialTracks.length ? initialTracks[0].id : null;
        renderRhythmboxLibrary(state);
        if (state.messageEl) {
            state.messageEl.textContent = "Scanning music folder...";
        }

        syncRhythmboxOpenInstancesVolume(sharedRhythmboxVolume, state);

        loadRhythmboxTrackLibrary(state).then(() => {
            if (!container.isConnected || container.__rhythmboxState !== state) return;
            state.libraryLoading = false;
            const loadedTracks = getRhythmboxVisibleTracks(state);
            state.selectedTrackId = loadedTracks.length ? loadedTracks[0].id : null;
            renderRhythmboxLibrary(state);
            hydrateRhythmboxTrackDurations(state);
            if (state.messageEl) {
                state.messageEl.textContent = "";
            }
        }).catch(() => {
            if (!container.isConnected || container.__rhythmboxState !== state) return;
            state.libraryLoading = false;
            renderRhythmboxLibrary(state);
            showRhythmboxMessage(state, "Could not scan music folder.");
        });

        if (state.progressInput) {
            updateRhythmboxRangeFill(state.progressInput);
        }
        if (state.volumeInput) {
            updateRhythmboxRangeFill(state.volumeInput);
        }
    }

    function positionWindow(windowEl, app) {
        if (!windowEl || !app) return;
        if (window.innerWidth <= 980) {
            windowEl.style.left = "";
            windowEl.style.top = "";
            windowEl.style.width = "";
            windowEl.style.height = "";
            return;
        }

        const rootStyles = window.getComputedStyle(document.documentElement);
        const topBarHeight = parseFloat(rootStyles.getPropertyValue("--topbar-height")) || 48;
        const dockWidth = parseFloat(rootStyles.getPropertyValue("--dock-width")) || 88;
        const availableWidth = Math.max(320, window.innerWidth - dockWidth - 48);
        const availableHeight = Math.max(220, window.innerHeight - topBarHeight - 48);
        const width = clamp(Number(app.width) || 900, 320, availableWidth);
        const height = clamp(Number(app.height) || 600, 220, availableHeight);
        const leftBase = dockWidth + 24 + (Number(app.left) || 0);
        const topBase = topBarHeight + 24 + (Number(app.top) || 0);
        const left = clamp(leftBase, dockWidth + 16, Math.max(dockWidth + 16, window.innerWidth - width - 16));
        const top = clamp(topBase, topBarHeight + 16, Math.max(topBarHeight + 16, window.innerHeight - height - 16));

        windowEl.style.left = left + "px";
        windowEl.style.top = top + "px";
        windowEl.style.width = width + "px";
        windowEl.style.height = height + "px";
    }

    function bringToFront(windowEl, appId) {
        if (!windowEl) return;

        highestZIndex += 1;
        windowEl.style.zIndex = String(highestZIndex);
        activeWindowId = appId || activeWindowId;

        windowRegistry.forEach((record, id) => {
            if (!record || !record.window) return;
            record.window.classList.toggle("is-focused", id === activeWindowId && !record.window.classList.contains("is-hidden"));
        });

        syncDockState();
    }

    function syncDockState() {
        if (!dockApps) return;

        dockApps.querySelectorAll(".dock-item").forEach((item) => {
            const appId = item.getAttribute("data-app-id");
            const record = appId ? windowRegistry.get(appId) : null;
            const isOpen = Boolean(record && record.window && !record.window.classList.contains("is-hidden"));
            item.classList.toggle("is-active", isOpen && activeWindowId === appId);
            const button = item.querySelector(".dock-item__button");
            if (button) {
                button.setAttribute("aria-pressed", isOpen ? "true" : "false");
            }
        });
    }

    function hideWindow(appId, minimize) {
        const record = windowRegistry.get(appId);
        if (!record || !record.window) return;

        if (minimize) {
            record.window.classList.add("is-minimized");
            record.window.classList.remove("is-hidden", "is-focused");
        } else {
            record.window.classList.add("is-hidden");
            record.window.classList.remove("is-minimized", "is-focused");
        }

        if (activeWindowId === appId) {
            activeWindowId = null;
        }

        syncDockState();
    }

    function toggleMaximize(appId) {
        const record = windowRegistry.get(appId);
        if (!record || !record.window) return;

        const windowEl = record.window;
        if (!windowEl.classList.contains("is-maximized")) {
            windowEl.dataset.restoreStyle = JSON.stringify({
                left: windowEl.style.left || "",
                top: windowEl.style.top || "",
                width: windowEl.style.width || "",
                height: windowEl.style.height || ""
            });
            windowEl.classList.add("is-maximized");
            windowEl.style.left = "0px";
            windowEl.style.top = "0px";
            windowEl.style.width = "100%";
            windowEl.style.height = "100%";
        } else {
            windowEl.classList.remove("is-maximized");
            const restore = windowEl.dataset.restoreStyle ? JSON.parse(windowEl.dataset.restoreStyle) : null;
            if (restore) {
                windowEl.style.left = restore.left || "";
                windowEl.style.top = restore.top || "";
                windowEl.style.width = restore.width || "";
                windowEl.style.height = restore.height || "";
            } else {
                positionWindow(windowEl, record.app);
            }
        }

        syncDockState();
    }

    function makeWindowDraggable(windowEl, dragHandle, appId) {
        if (!windowEl || !dragHandle) return;

        let dragging = false;
        let startX = 0;
        let startY = 0;
        let startLeft = 0;
        let startTop = 0;

        dragHandle.addEventListener("pointerdown", (event) => {
            if (event.button !== 0) return;
            if (windowEl.classList.contains("is-maximized")) return;
            if (event.target.closest("button, input, textarea, select, a")) return;

            dragging = true;
            startX = event.clientX;
            startY = event.clientY;
            const rect = windowEl.getBoundingClientRect();
            startLeft = rect.left;
            startTop = rect.top;
            bringToFront(windowEl, appId);
            event.preventDefault();
        });

        window.addEventListener("pointermove", (event) => {
            if (!dragging) return;
            const nextLeft = startLeft + (event.clientX - startX);
            const nextTop = startTop + (event.clientY - startY);
            const maxLeft = Math.max(0, window.innerWidth - windowEl.offsetWidth);
            const maxTop = Math.max(0, window.innerHeight - windowEl.offsetHeight);
            windowEl.style.left = clamp(nextLeft, 0, maxLeft) + "px";
            windowEl.style.top = clamp(nextTop, 0, maxTop) + "px";
        });

        window.addEventListener("pointerup", () => {
            dragging = false;
        });
    }

            || states.find((state) => state.currentTrackId)
            || null;

    function getRhythmboxPlaybackSnapshot() {
        const state = getActiveRhythmboxState();
        if (!state || !state.currentTrackId) return null;
        const track = rhythmboxTrackLibrary.find((candidate) => candidate.id === state.currentTrackId);
        if (!track) return null;

        const currentSeconds = state.audio && Number.isFinite(state.audio.currentTime) ? state.audio.currentTime : 0;
        const durationSeconds = state.audio && Number.isFinite(state.audio.duration) && state.audio.duration > 0
            ? state.audio.duration
            : parseRhythmboxDuration(track.duration);
        return {
            state: state,
            track: track,
            currentSeconds: currentSeconds,
            durationSeconds: durationSeconds
        };
    }

    function runSingleCommand(cmdLine, state) {
        const parts = cmdLine.trim().split(" ").filter(Boolean);
        const baseCmd = parts[0];
        const args = parts.slice(1);

        if (!baseCmd) {
            return [];
        }

        if (commands[baseCmd]) {
            return commands[baseCmd](args, state);
        }

        return ["bash: " + baseCmd + ": command not found"];
    }

    function getAllTokens() {
        return [...Object.keys(commands), ...Object.keys(fileSystem)];
    }

    function findMatches(token, mode) {
        const commandsList = Object.keys(commands);
        const filesList = Object.keys(fileSystem);
        let pool = [];

        if (mode === "command") pool = commandsList;
        else if (mode === "file") pool = filesList;
        else pool = [...commandsList, ...filesList];

        return pool.filter((item) => item.toLowerCase().startsWith(token.toLowerCase()));
    }

    function getTerminalState(container) {
        if (!container.__terminalState) {

    function getTerminalTabsState(container) {
        if (!container.__terminalTabsState) {
            container.__terminalTabsState = {
                tabs: [],
                activeTabId: null,
                nextIndex: 1,
                tabbar: container.querySelector(".terminal-tabbar"),
                tablist: container.querySelector("[data-terminal-tabs]"),
                panels: container.querySelector("[data-terminal-panels]")
            };

    function createTerminalTab(container) {
        const tabsState = getTerminalTabsState(container);
        if (!tabsState.tablist || !tabsState.panels) return null;

        const tabId = "terminal-tab-" + Date.now() + "-" + Math.random().toString(16).slice(2);
        const tabLabel = tabsState.nextIndex === 1 ? "Terminal" : "Terminal " + tabsState.nextIndex;
        tabsState.nextIndex += 1;

        const tabButton = document.createElement("button");
        tabButton.className = "terminal-tab";
        tabButton.type = "button";
        tabButton.setAttribute("data-terminal-tab", tabId);
        tabButton.setAttribute("role", "tab");
        tabButton.setAttribute("aria-selected", "false");
        tabButton.textContent = tabLabel;

        const panel = document.createElement("section");
        panel.className = "terminal-panel";
        panel.setAttribute("data-terminal-panel", tabId);
        panel.setAttribute("role", "tabpanel");
        panel.innerHTML = "<div class='terminal-body' data-terminal-output></div>";

        tabsState.tablist.appendChild(tabButton);
        tabsState.panels.appendChild(panel);

        const tab = {
            id: tabId,
            label: tabLabel,
            button: tabButton,
            panel: panel
        };

        tabsState.tabs.push(tab);
        return tab;
    }

    function activateTerminalTab(container, tabId) {
        const tabsState = getTerminalTabsState(container);
        const nextTab = tabsState.tabs.find((tab) => tab.id === tabId);
        if (!nextTab) return;

        tabsState.activeTabId = tabId;
        tabsState.tabs.forEach((tab) => {
            const isActive = tab.id === tabId;
            tab.button.classList.toggle("is-active", isActive);
            tab.button.setAttribute("aria-selected", isActive ? "true" : "false");
            tab.panel.classList.toggle("is-active", isActive);
        });

        bootTerminalPanel(nextTab.panel);
        focusTerminalInput(nextTab.panel);
    }

    function openTerminalTab(container) {
        const tab = createTerminalTab(container);
        if (!tab) return null;

    function bootTerminalPanel(panel) {
        const state = getTerminalState(panel);
        if (panel.dataset.ready === "true") {
            focusTerminalInput(panel);
            return;

        panel.dataset.ready = "true";
        state.output = panel.querySelector("[data-terminal-output]");
        createInputLine(panel, state);
        scrollTerminalToBottom(state);

    function createInputLine(container, state) {
        if (!state || !state.output) return;

        const line = document.createElement("div");
        line.className = "command-line";
        line.innerHTML = [
            "<span class='prompt'>" + getPrompt() + "</span>",
            "<input type='text' class='terminal-input' placeholder=\"Type 'help'...\" autocomplete='off' />"
        ].join("");

        state.output.appendChild(line);

        const input = line.querySelector("input");
        input.focus();

        input.addEventListener("keydown", (event) => {
            if (event.key === "Tab") {
                event.preventDefault();
                event.stopPropagation();

                const value = input.value.trim();
                if (!value) return;

                const parts = value.split(" ");
                const command = parts[0];
                const lastToken = parts[parts.length - 1];
                const isFirstToken = parts.length === 1;
                let mode = "none";

                if (isFirstToken) {
                    mode = "command";
                } else if (commandMeta[command]) {
                    const expectedIndex = commandMeta[command].fileArgIndex;
                    if (parts.length - 1 === expectedIndex) {
                        mode = "file";
                    } else {
                        return;
                    }
                } else {
                    return;
                }

                const matches = findMatches(lastToken, mode);

                if (matches.length === 1) {
                    parts[parts.length - 1] = matches[0];
                    input.value = parts.join(" ") + " ";
                    return;
                }

                if (matches.length > 1) {
                    const echoLine = document.createElement("div");
                    echoLine.className = "command-line echo-command";
                    echoLine.innerHTML = "<span class='prompt'>" + getPrompt() + "</span> " + value;
                    state.output.replaceChild(echoLine, line);

                    const suggestionLine = document.createElement("div");
                    suggestionLine.className = "response";
                    suggestionLine.innerHTML = "<p style='color:#9a9a9a;'>" + matches.join("   ") + "</p>";
                    state.output.appendChild(suggestionLine);

                    createInputLine(container, state);
                    scrollTerminalToBottom(state);
                }
            } else if (event.key === "Enter") {
                handleCommand(container, state, input.value.trim(), line);
            } else if (event.key === "ArrowUp") {
                event.preventDefault();
                if (state.history.length && state.historyIndex > 0) {
                    input.value = state.history[--state.historyIndex];
                }
            } else if (event.key === "ArrowDown") {
                event.preventDefault();
                if (state.history.length && state.historyIndex < state.history.length - 1) {
                    input.value = state.history[++state.historyIndex];
                } else {
                    state.historyIndex = state.history.length;
                    input.value = "";
                }
            }

            if (event.ctrlKey && event.key.toLowerCase() === "l") {
                event.preventDefault();
                commands.clear([], state);
                createInputLine(container, state);
                scrollTerminalToBottom(state);
            }
        });
    }

    function scrollTerminalToBottom(state) {
        requestAnimationFrame(() => {
            if (state && state.output) {
                state.output.scrollTop = state.output.scrollHeight;
            }
        });
    }

    function handleCommand(container, state, cmd, lineElement) {
        if (!state || !state.output) return;

        const input = lineElement.querySelector("input");
        if (input) {
            input.disabled = true;
        }

        const echo = document.createElement("div");
        echo.className = "command-line echo-command";
        echo.innerHTML = "<span class='prompt'>" + getPrompt() + "</span> " + cmd;
        state.output.replaceChild(echo, lineElement);

        if (cmd) {
            state.history.push(cmd);
            state.historyIndex = state.history.length;
        }

        const pipeline = cmd.split("&&").map((part) => part.trim()).filter(Boolean);
        for (let index = 0; index < pipeline.length; index += 1) {
            const result = runSingleCommand(pipeline[index], state);
            result.forEach((text) => {
                const response = document.createElement("div");
                response.className = "response";
                response.innerHTML = "<p>" + text + "</p>";
                state.output.appendChild(response);
            });
        }

        createInputLine(container, state);
        scrollTerminalToBottom(state);
    }

    function focusTerminalInput(root) {
        const scope = root && root.matches && root.matches(".terminal-shell")
            ? root.querySelector(".terminal-panel.is-active") || root
            : root;
        const inputs = scope ? scope.querySelectorAll(".terminal-input") : [];
        const latestInput = inputs.length ? inputs[inputs.length - 1] : null;
        if (latestInput) {
            latestInput.focus();
        }
    }

    function bootTerminal(container) {
        if (container.dataset.ready === "true") {
            focusTerminalInput(container);
            return;
        }

        container.dataset.ready = "true";
        const tabsState = getTerminalTabsState(container);
        if (!tabsState.tabs.length) {
            addTerminalTab(container);
            return;
        }

        activateTerminalTab(container, tabsState.activeTabId || tabsState.tabs[0].id);
    }

    function readThunderbirdDraft() {
        const fallback = getThunderbirdDefaultDraft();
        try {
            const saved = JSON.parse(window.localStorage.getItem(thunderbirdDraftStorageKey) || "null");
            return saved ? { ...fallback, ...saved } : fallback;
        } catch (error) {
            return fallback;
        }
    }

    function saveThunderbirdDraft(state) {
        if (!state) return;
        const draft = {
            to: state.toInput.value,
            cc: state.ccInput.value,
            bcc: state.bccInput.value,
            subject: state.subjectInput.value,
            body: state.editor.innerText.replace(/\r/g, ""),
            showCc: !state.ccRow.classList.contains("is-hidden"),
            showBcc: !state.bccRow.classList.contains("is-hidden"),
            font: state.fontSelect.value,
            block: state.blockSelect.value,
            textColor: state.colorInput.value,
            spellcheck: state.editor.spellcheck,
            attachmentName: state.attachmentNameEl.textContent === "No attachment selected" ? "" : state.attachmentNameEl.textContent
        };
        window.localStorage.setItem(thunderbirdDraftStorageKey, JSON.stringify(draft));
    }

    function setThunderbirdStatus(state, message) {
        if (!state || !state.statusEl) return;
        state.statusEl.textContent = message || "";
    }

    function updateThunderbirdToggle(button, active) {
        if (!button) return;
        button.classList.toggle("is-active", Boolean(active));
        button.setAttribute("aria-pressed", active ? "true" : "false");
    }

    function toggleThunderbirdField(row, button, forceOpen) {
        if (!row || !button) return;
        const nextOpen = typeof forceOpen === "boolean" ? forceOpen : row.classList.contains("is-hidden");
        row.classList.toggle("is-hidden", !nextOpen);
        button.classList.toggle("is-active", nextOpen);
        button.setAttribute("aria-pressed", nextOpen ? "true" : "false");
    }

    function applyThunderbirdFont(editor, value) {
        if (!editor) return;
        editor.dataset.mailFont = value || "sans";
    }

    function applyThunderbirdBlock(state, blockTag) {
        if (!state) return;
        state.blockSelect.value = blockTag;
        state.editor.focus();
        if (typeof document.execCommand === "function") {
            const formatValue = blockTag === "blockquote" ? "blockquote" : "<" + blockTag + ">";
            document.execCommand("formatBlock", false, formatValue);
        }
        saveThunderbirdDraft(state);
    }

    function applyThunderbirdColor(state, colorValue) {
        if (!state) return;
        const nextColor = colorValue || "#000000";
        state.colorInput.value = nextColor;
        state.colorButton.style.setProperty("--mail-color-swatch", nextColor);
        state.editor.focus();
        if (typeof document.execCommand === "function") {
            document.execCommand("styleWithCSS", false, true);
            document.execCommand("foreColor", false, nextColor);
        }
        saveThunderbirdDraft(state);
    }

    function executeThunderbirdCommand(state, command) {
        if (!state || typeof document.execCommand !== "function") return;
        state.editor.focus();
        if (command === "removeFormat") {
            document.execCommand("removeFormat", false);
            document.execCommand("unlink", false);
        } else {
            document.execCommand(command, false);
        }
        saveThunderbirdDraft(state);
    }

    function bootThunderbird(container) {
        if (!container) return;

        const state = {
            toInput: container.querySelector("[data-mail-to]"),
            ccInput: container.querySelector("[data-mail-cc]"),
            bccInput: container.querySelector("[data-mail-bcc]"),
            subjectInput: container.querySelector("[data-mail-subject]"),
            editor: container.querySelector("[data-mail-editor]"),
            ccRow: container.querySelector("[data-mail-cc-row]"),
            bccRow: container.querySelector("[data-mail-bcc-row]"),
            ccToggle: container.querySelector("[data-mail-toggle='cc']"),
            bccToggle: container.querySelector("[data-mail-toggle='bcc']"),
            blockSelect: container.querySelector("[data-mail-block]"),
            fontSelect: container.querySelector("[data-mail-font]"),
            colorInput: container.querySelector("[data-mail-color-input]"),
            colorButton: container.querySelector("[data-mail-color-swatch]"),
            statusEl: container.querySelector("[data-mail-status]"),
            attachmentNameEl: container.querySelector("[data-mail-attachment]"),
            attachInput: container.querySelector("[data-mail-attach-input]"),
            spellingButton: container.querySelector("[data-mail-action='spelling']")
        };

        const draft = readThunderbirdDraft();
        state.toInput.value = draft.to;
        state.ccInput.value = draft.cc;
        state.bccInput.value = draft.bcc;
        state.subjectInput.value = draft.subject;
        state.editor.textContent = draft.body;
        state.blockSelect.value = draft.block;
        state.fontSelect.value = draft.font;
        state.colorInput.value = draft.textColor;
        state.attachmentNameEl.textContent = draft.attachmentName || "No attachment selected";
        state.editor.spellcheck = draft.spellcheck !== false;
        updateThunderbirdToggle(state.spellingButton, state.editor.spellcheck);
        toggleThunderbirdField(state.ccRow, state.ccToggle, Boolean(draft.showCc || draft.cc));
        toggleThunderbirdField(state.bccRow, state.bccToggle, Boolean(draft.showBcc || draft.bcc));
        applyThunderbirdFont(state.editor, draft.font);
        state.colorButton.style.setProperty("--mail-color-swatch", draft.textColor);

        if (container.dataset.ready === "true") {
            state.editor.focus();
            return;
        }

        container.dataset.ready = "true";

        [state.toInput, state.ccInput, state.bccInput, state.subjectInput].forEach((input) => {
            input.addEventListener("input", () => saveThunderbirdDraft(state));
        });

        state.editor.addEventListener("input", () => saveThunderbirdDraft(state));
        state.editor.addEventListener("keydown", (event) => {
            if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
                event.preventDefault();
                container.querySelector("[data-mail-action='send']").click();
            }
        });

        state.ccToggle.addEventListener("click", () => {
            toggleThunderbirdField(state.ccRow, state.ccToggle);
            saveThunderbirdDraft(state);
        });

        state.bccToggle.addEventListener("click", () => {
            toggleThunderbirdField(state.bccRow, state.bccToggle);
            saveThunderbirdDraft(state);
        });

        state.blockSelect.addEventListener("change", () => applyThunderbirdBlock(state, state.blockSelect.value));
        state.fontSelect.addEventListener("change", () => {
            applyThunderbirdFont(state.editor, state.fontSelect.value);
            saveThunderbirdDraft(state);
        });

        state.colorInput.addEventListener("input", () => applyThunderbirdColor(state, state.colorInput.value));

        container.querySelectorAll("[data-mail-command]").forEach((button) => {
            button.addEventListener("click", () => executeThunderbirdCommand(state, button.getAttribute("data-mail-command")));
        });

        container.querySelectorAll("[data-mail-action]").forEach((button) => {
            button.addEventListener("click", () => {
                const action = button.getAttribute("data-mail-action");
                if (action === "pick-color") {
                    state.colorInput.click();
                    return;
                }
                if (action === "spelling") {
                    state.editor.spellcheck = !state.editor.spellcheck;
                    updateThunderbirdToggle(state.spellingButton, state.editor.spellcheck);
                    setThunderbirdStatus(state, state.editor.spellcheck ? "Spellcheck enabled." : "Spellcheck disabled.");
                    saveThunderbirdDraft(state);
                    return;
                }
                if (action === "attach") {
                    state.attachInput.click();
                    return;
                }
                if (action === "send") {
                    const to = state.toInput.value.trim();
                    const cc = state.ccInput.value.trim();
                    const bcc = state.bccInput.value.trim();
                    const subject = state.subjectInput.value.trim();
                    const bodyText = state.editor.innerText.replace(/\r/g, "").trimEnd();
                    const query = [];
                    if (cc) query.push("cc=" + encodeURIComponent(cc));
                    if (bcc) query.push("bcc=" + encodeURIComponent(bcc));
                    if (subject) query.push("subject=" + encodeURIComponent(subject));
                    if (bodyText) query.push("body=" + encodeURIComponent(bodyText));
                    const mailtoUrl = "mailto:" + encodeURIComponent(to) + (query.length ? "?" + query.join("&") : "");
                    saveThunderbirdDraft(state);
                    setThunderbirdStatus(state, "Opening your default mail app...");
                    window.location.href = mailtoUrl;
                }
            });
        });

        state.attachInput.addEventListener("change", () => {
            const file = state.attachInput.files && state.attachInput.files[0] ? state.attachInput.files[0] : null;
            state.attachmentNameEl.textContent = file ? file.name : "No attachment selected";
            setThunderbirdStatus(
                state,
                file
                    ? "Attachment selected here. Add it again in your mail app after Send, because mailto cannot carry files."
                    : "Attachment cleared."
            );
            saveThunderbirdDraft(state);
        });

        state.editor.focus();
    }

    function getEditorCaretPosition(textarea) {
        const value = textarea ? textarea.value : "";
        const cursor = textarea ? textarea.selectionStart || 0 : 0;
        const before = value.slice(0, cursor).split("\n");
        const line = before.length;
        const column = (before[before.length - 1] || "").length + 1;
        return { line, column };
    }

    function renderEditorSidebar(container) {
        const state = getEditorState(container);
        const activeTab = getActiveEditorTab(state);
        if (!state.tabsBar) return;

        const docs = getEditorDocuments();
        state.tabsBar.innerHTML = [
            "<div class='gedit-open-menu__section'>Open Document</div>",
            docs.map((doc) => {
                const isActive = activeTab && activeTab.sourceId === doc.id;
                return [
                    "<button class='gedit-open-menu__item" + (isActive ? " is-active" : "") + "' type='button' data-editor-file='" + doc.id + "'>",
                    "  <span class='gedit-open-menu__item-title'>" + doc.title + "</span>",
                    "  <span class='gedit-open-menu__item-meta'>text</span>",
                    "</button>"
                ].join("");
            }).join("")
        ].join("");
    }

    function renderEditorTabs(container) {
        const state = getEditorState(container);
        const tabsBar = state.tabsBar;
        if (!tabsBar) return;

        const activeTab = getActiveEditorTab(state);
        if (state.title) {
            state.title.textContent = activeTab ? activeTab.title : "Text Editor";
        }

        tabsBar.classList.toggle("is-open", Boolean(state.menuOpen));
        tabsBar.innerHTML = [
            "<div class='gedit-open-menu__section'>Documents</div>",
            state.tabs.map((tab) => [
                "<div class='gedit-open-menu__item" + (activeTab && activeTab.id === tab.id ? " is-active" : "") + "' role='button' tabindex='0' data-editor-tab='" + tab.id + "'>",
                "  <span class='gedit-open-menu__item-title'>" + (tab.dirty ? "*" : "") + tab.title + "</span>",
                "  <span class='gedit-open-menu__item-meta'>text</span>",
                "  <button class='gedit-open-menu__item-close' type='button' data-editor-tab-close='" + tab.id + "' aria-label='Close " + tab.title + "'>×</button>",
                "</div>"
            ].join("")).join("")
        ].join("");
    }

    function renderEditorLineNumbers(container) {
        const state = getEditorState(container);
        const activeTab = getActiveEditorTab(state);
        if (!state.lines || !state.textarea || !activeTab) return;

        const lines = (state.textarea.value || activeTab.content || "").split("\n");
        const caret = getEditorCaretPosition(state.textarea);
        state.lines.innerHTML = lines.map((_, index) => (
            "<div class='gedit-line" + (index + 1 === caret.line ? " is-active" : "") + "'>" + (index + 1) + "</div>"
        )).join("");

        if (state.currentLine) {
            state.currentLine.style.top = (16 + ((caret.line - 1) * 22.8) - (state.textarea.scrollTop || 0)) + "px";
        }

        if (state.lines) {
            state.lines.scrollTop = state.textarea.scrollTop || 0;
        }
    }

    function syncEditorStatus(container) {
        const state = getEditorState(container);
        const activeTab = getActiveEditorTab(state);
        if (!activeTab || !state.textarea) return;

        const caret = getEditorCaretPosition(state.textarea);
        if (state.statusFile) {
            state.statusFile.textContent = activeTab.title + (activeTab.dirty ? " • modified" : "");
        }
        if (state.statusPosition) {
            state.statusPosition.textContent = "Ln " + caret.line + ", Col " + caret.column;
        }
    }

    function syncEditorView(container) {
        const state = getEditorState(container);
        const activeTab = getActiveEditorTab(state);
        if (!activeTab || !state.textarea) return;

        state.textarea.value = activeTab.content;
        renderEditorTabs(container);
        renderEditorLineNumbers(container);
        syncEditorStatus(container);
        state.textarea.scrollTop = 0;
    }

    function createEditorTab(container, docId, options = {}) {
        const state = getEditorState(container);
        const docs = getEditorDocuments();
        const existing = docId ? state.tabs.find((tab) => tab.sourceId === docId) : null;
        if (existing && options.allowDuplicate !== true) {
            state.activeTabId = existing.id;
            syncEditorView(container);
            return existing;
        }

        const source = docId ? docs.find((doc) => doc.id === docId) : null;
        const tab = {
            id: "editor-tab-" + Date.now() + "-" + Math.random().toString(16).slice(2),
            sourceId: source ? source.id : null,
            title: source ? source.title : "Untitled Document " + state.untitledCount,
            content: source ? source.content : "",
            dirty: Boolean(options.dirty),
            lineNumbers: true
        };

        if (!source) {
            state.untitledCount += 1;
        }

        state.tabs.push(tab);
        state.activeTabId = tab.id;
        syncEditorView(container);
        return tab;
    }

    function activateEditorTab(container, tabId) {
        const state = getEditorState(container);
        const targetTab = state.tabs.find((tab) => tab.id === tabId);
        if (!targetTab) return;

        state.activeTabId = tabId;
        syncEditorView(container);
        if (state.textarea) {
            state.textarea.focus();
            state.textarea.setSelectionRange(state.textarea.value.length, state.textarea.value.length);
        }
    }

    function closeEditorTab(container, tabId) {
        const state = getEditorState(container);
        if (state.tabs.length <= 1) {
            state.tabs = [];
            state.activeTabId = null;
            createEditorTab(container, null);
            return;
        }

        const index = state.tabs.findIndex((tab) => tab.id === tabId);
        if (index < 0) return;

        const wasActive = state.activeTabId === tabId;
        state.tabs.splice(index, 1);
        if (wasActive) {
            const nextTab = state.tabs[Math.max(0, index - 1)] || state.tabs[0];
            state.activeTabId = nextTab.id;
        }
        syncEditorView(container);
    }

    function openEditorDocument(container, docId) {
        const state = getEditorState(container);
        const existing = state.tabs.find((tab) => tab.sourceId === docId);
        if (existing) {
            activateEditorTab(container, existing.id);
            return;
        }
        createEditorTab(container, docId);
    }

    function openBlankEditorTab(container) {
        createEditorTab(container, null, { allowDuplicate: true });
    }

    function toggleEditorMenu(container, forceOpen) {
        const state = getEditorState(container);
        state.menuOpen = typeof forceOpen === "boolean" ? forceOpen : !state.menuOpen;
        renderEditorTabs(container);
    }

    function bootEditor(container) {
        const state = getEditorState(container);
        if (container.dataset.ready === "true") {
            renderEditorTabs(container);
            renderEditorLineNumbers(container);
            syncEditorStatus(container);
            if (state.textarea) {
                state.textarea.focus();
            }
            return;
        }

        container.dataset.ready = "true";

        if (!state.tabs.length) {
            createEditorTab(container, "projects.txt");
        }

        renderEditorTabs(container);
        syncEditorView(container);

        container.addEventListener("click", (event) => {
            const menuToggle = event.target.closest("[data-editor-action='toggle-open-menu']");
            if (menuToggle) {
                event.stopPropagation();
                toggleEditorMenu(container);
                return;
            }

            if (!event.target.closest("[data-editor-tabs], [data-editor-action='toggle-open-menu']")) {
                toggleEditorMenu(container, false);
            }
        });

        if (state.tabsBar) {
            state.tabsBar.addEventListener("click", (event) => {
                const closeButton = event.target.closest("[data-editor-tab-close]");
                if (closeButton) {
                    event.stopPropagation();
                    closeEditorTab(container, closeButton.getAttribute("data-editor-tab-close"));
                    return;
                }

                const tabButton = event.target.closest("[data-editor-tab]");
                if (tabButton) {
                    event.stopPropagation();
                    activateEditorTab(container, tabButton.getAttribute("data-editor-tab"));
                    toggleEditorMenu(container, false);
                }
            });
        }

        container.querySelectorAll("[data-editor-action='new-tab']").forEach((button) => {
            button.addEventListener("click", () => {
                openBlankEditorTab(container);
                toggleEditorMenu(container, true);
                if (state.textarea) {
                    state.textarea.focus();
                }
            });
        });

        container.querySelectorAll("[data-editor-action='save']").forEach((button) => {
            button.addEventListener("click", () => {
                const activeTab = getActiveEditorTab(state);
                if (!activeTab) return;
                activeTab.dirty = false;
                syncEditorStatus(container);
                renderEditorTabs(container);
            });
        });

        if (state.textarea) {
            state.textarea.addEventListener("input", () => {
                const activeTab = getActiveEditorTab(state);
                if (!activeTab) return;
                activeTab.content = state.textarea.value;
                activeTab.dirty = true;
                renderEditorLineNumbers(container);
                syncEditorStatus(container);
            });

            state.textarea.addEventListener("scroll", () => {
                if (state.lines) {
                    state.lines.scrollTop = state.textarea.scrollTop;
                }
                renderEditorLineNumbers(container);
            });

            state.textarea.addEventListener("keyup", () => renderEditorLineNumbers(container));
            state.textarea.addEventListener("click", () => renderEditorLineNumbers(container));
            state.textarea.addEventListener("mouseup", () => renderEditorLineNumbers(container));
            state.textarea.addEventListener("keydown", (event) => {
                if (event.key === "Tab") {
                    event.preventDefault();
                    const start = state.textarea.selectionStart || 0;
                    const end = state.textarea.selectionEnd || 0;
                    const value = state.textarea.value;
                    state.textarea.value = value.slice(0, start) + "    " + value.slice(end);
                    state.textarea.selectionStart = state.textarea.selectionEnd = start + 4;
                    const activeTab = getActiveEditorTab(state);
                    if (activeTab) {
                        activeTab.content = state.textarea.value;
                        activeTab.dirty = true;
                    }
                    renderEditorLineNumbers(container);
                    syncEditorStatus(container);
                } else if (event.ctrlKey && event.key.toLowerCase() === "s") {
                    event.preventDefault();
                    const activeTab = getActiveEditorTab(state);
                    if (activeTab) {
                        activeTab.dirty = false;
                        syncEditorStatus(container);
                    }
                }
            });
        }

        document.addEventListener("pointerdown", (event) => {
            if (!container.isConnected) return;
            if (!event.target.closest("[data-editor-shell]")) {
                toggleEditorMenu(container, false);
            }
        });
    }

    function formatMinesTime(seconds) {
        const total = Math.max(0, Math.floor(seconds || 0));
        const minutes = Math.floor(total / 60);
        const remaining = total % 60;
        return String(minutes).padStart(2, "0") + ":" + String(remaining).padStart(2, "0");
    }

    function bootMines(container) {
        if (!container) return;
        if (container.dataset.ready === "true") {
            const existingState = container.__minesState;
            if (existingState) {
                updateMinesLayout(existingState);
                syncMinesUi(existingState);
            }
            return;
        }

        container.dataset.ready = "true";
        const state = {
            container: container,
            root: container,
            boardEl: container.querySelector("[data-mines-board]"),
            flagsEl: container.querySelector("[data-mines-flags]"),
            timeEl: container.querySelector("[data-mines-time]"),
            menuEl: container.querySelector("[data-mines-menu]"),
            overlayEl: container.querySelector("[data-mines-overlay]"),
            questionToggle: container.querySelector("[data-mines-question-flags]"),
            levelKey: "beginner",
            rows: minesPresets.beginner.rows,
            cols: minesPresets.beginner.cols,
            mines: minesPresets.beginner.mines,
            board: [],
            cellButtons: [],
            generated: false,
            firstMove: true,
            revealed: 0,
            flagged: 0,
            timer: 0,
            timerId: null,
            paused: false,
            gameOver: false,
            won: false,
            menuOpen: false,
            resizeHandler: null
        };

        container.__minesState = state;
        buildMinesBoard(state);
        bindMinesControls(state);
        resetMinesGame(state, "beginner");

        state.resizeHandler = () => updateMinesLayout(state);
        window.addEventListener("resize", state.resizeHandler);
        requestAnimationFrame(() => updateMinesLayout(state));
    }

    function bindMinesControls(state) {
        if (!state || !state.container) return;

        state.container.addEventListener("contextmenu", (event) => {
            const cellButton = event.target.closest("[data-mines-cell]");
            if (!cellButton || !state.container.contains(cellButton)) return;
            event.preventDefault();
            toggleMinesMark(state, cellButton);
        });

        state.container.addEventListener("click", (event) => {
            const actionButton = event.target.closest("[data-mines-action]");
            if (actionButton && state.container.contains(actionButton)) {
                const action = actionButton.getAttribute("data-mines-action");
                if (action === "restart") {
                    resetMinesGame(state, state.levelKey);
                } else if (action === "pause") {
                    toggleMinesPause(state);
                } else if (action === "menu" || action === "difficulty") {
                    toggleMinesMenu(state);
                } else if (action === "hint") {
                    useMinesHint(state);
                }
                return;
            }

            const diffButton = event.target.closest("[data-mines-difficulty]");
            if (diffButton && state.container.contains(diffButton)) {
                const preset = diffButton.getAttribute("data-mines-difficulty");
                if (preset === "custom") {
                    applyMinesCustomDifficulty(state);
                } else {
                    resetMinesGame(state, preset);
                }
                toggleMinesMenu(state, false);
                return;
            }

            const cellButton = event.target.closest("[data-mines-cell]");
            if (!cellButton || !state.container.contains(cellButton)) return;
            revealMinesCellFromButton(state, cellButton);
        });

        if (state.questionToggle) {
            state.questionToggle.addEventListener("change", () => {
                state.questionFlags = Boolean(state.questionToggle.checked);
                toggleMinesMenu(state, false);
            });
        }

        document.addEventListener("pointerdown", (event) => {
            if (!state.container.isConnected) return;
            if (state.menuOpen && !event.target.closest(".mines-menu, [data-mines-action='menu'], [data-mines-action='difficulty']")) {
                toggleMinesMenu(state, false);
            }
        });
    }

    function resetMinesGame(state, presetKey) {
        const preset = minesPresets[presetKey] || minesPresets.beginner;
        state.levelKey = presetKey && minesPresets[presetKey] ? presetKey : "beginner";
        state.rows = preset.rows;
        state.cols = preset.cols;
        state.mines = preset.mines;
        state.generated = false;
        state.firstMove = true;
        state.revealed = 0;
        state.flagged = 0;
        state.timer = 0;
        state.paused = false;
        state.gameOver = false;
        state.won = false;
        state.board = [];
        state.cellButtons = [];
        state.container.classList.remove("is-paused", "is-won", "is-lost");
        if (state.overlayEl) state.overlayEl.textContent = "Paused";
        stopMinesTimer(state);
        buildMinesBoard(state);
        syncMinesUi(state);
        updateMinesLayout(state);
    }

    function buildMinesBoard(state) {
        if (!state.boardEl) return;

        state.boardEl.innerHTML = "";
        state.board = [];
        state.cellButtons = [];

        for (let row = 0; row < state.rows; row += 1) {
            const rowCells = [];
            for (let col = 0; col < state.cols; col += 1) {
                const cell = {
                    row: row,
                    col: col,
                    mine: false,
                    adjacent: 0,
                    revealed: false,
                    mark: "none",
                    blasted: false,
                    wrongFlag: false,
                    button: null
                };
                const button = document.createElement("button");
                button.type = "button";
                button.className = "mines-cell mines-cell--covered";
                button.setAttribute("data-mines-cell", "");
                button.dataset.row = String(row);
                button.dataset.col = String(col);
                button.setAttribute("aria-label", "Covered tile");
                const symbol = document.createElement("span");
                symbol.className = "mines-cell__symbol";
                button.appendChild(symbol);
                cell.button = button;
                rowCells.push(cell);
                state.boardEl.appendChild(button);
                state.cellButtons.push(button);
            }
            state.board.push(rowCells);
        }
    }

    function updateMinesLayout(state) {
        if (!state || !state.boardEl || !state.boardEl.parentElement) return;
        const viewport = state.boardEl.parentElement;
        const availableWidth = Math.max(120, viewport.clientWidth - 8);
        const availableHeight = Math.max(120, viewport.clientHeight - 8);
        const tileSize = Math.max(15, Math.floor(Math.min(availableWidth / state.cols, availableHeight / state.rows, 31)));
        state.boardEl.style.setProperty("--mines-tile-size", tileSize + "px");
        state.boardEl.style.gridTemplateColumns = "repeat(" + state.cols + ", var(--mines-tile-size))";
        state.boardEl.style.gridTemplateRows = "repeat(" + state.rows + ", var(--mines-tile-size))";
    }

    function syncMinesUi(state) {
        if (!state) return;

        if (state.flagsEl) {
            state.flagsEl.textContent = state.flagged + "/" + state.mines;
        }
        if (state.timeEl) {
            state.timeEl.textContent = formatMinesTime(state.timer);
        }
        if (state.questionToggle) {
            state.questionToggle.checked = state.questionFlags;
        }
        if (state.container) {
            state.container.classList.toggle("is-paused", state.paused && !state.gameOver && !state.won);
            state.container.classList.toggle("is-won", state.won);
        }
        if (state.overlayEl) {
            state.overlayEl.textContent = state.won ? "Solved" : state.paused ? "Paused" : "";
        }

        state.cellButtons.forEach((button) => {
            const row = Number(button.dataset.row);
            const col = Number(button.dataset.col);
            const cell = state.board[row] && state.board[row][col];
            if (!cell) return;

            const classes = ["mines-cell"];
            if (cell.revealed) {
                classes.push("mines-cell--revealed");
            } else {
                classes.push("mines-cell--covered");
            }
            if (cell.mark === "flag") {
                classes.push("mines-cell--flagged");
            } else if (cell.mark === "question") {
                classes.push("mines-cell--question");
            }
            if (cell.wrongFlag) {
                classes.push("mines-cell--wrong-flag");
            }
            if (cell.blasted) {
                classes.push("mines-cell--blasted");
            }
            if (cell.revealed && !cell.mine && cell.adjacent > 0) {
                classes.push("mines-cell--number-" + cell.adjacent);
            }
            if (cell.revealed && cell.mine) {
                classes.push("mines-cell--mine");
            }

            button.className = classes.join(" ");

            if (cell.revealed) {
                button.disabled = state.gameOver || state.won;
                button.setAttribute("aria-label", cell.mine ? "Mine" : (cell.adjacent ? cell.adjacent + " adjacent mines" : "Empty tile"));
            } else {
                button.disabled = state.gameOver || state.won;
                let label = "Covered tile";
                if (cell.mark === "flag") label = "Flagged tile";
                if (cell.mark === "question") label = "Questioned tile";
                button.setAttribute("aria-label", label);
            }

            const symbol = button.querySelector(".mines-cell__symbol");
            if (symbol) {
                if (cell.revealed) {
                    symbol.textContent = cell.mine ? "💣" : (cell.adjacent > 0 ? String(cell.adjacent) : "");
                    symbol.className = "mines-cell__symbol" + (cell.mine ? " mines-cell__mine-symbol" : "");
                } else if (cell.mark === "flag") {
                    symbol.textContent = "⚑";
                    symbol.className = "mines-cell__symbol mines-cell__flag";
                } else if (cell.mark === "question") {
                    symbol.textContent = "?";
                    symbol.className = "mines-cell__symbol mines-cell__flag";
                } else {
                    symbol.textContent = "";
                    symbol.className = "mines-cell__symbol";
                }
            }
        });

        const pauseButton = state.container.querySelector("[data-mines-action='pause']");
        if (pauseButton) {
            pauseButton.textContent = state.paused && !state.gameOver && !state.won ? "Resume" : "Pause";
        }
    }

    function startMinesTimer(state) {
        if (state.timerId || state.paused || state.gameOver || state.won) return;
        state.timerId = window.setInterval(() => {
            if (state.paused || state.gameOver || state.won) return;
            state.timer += 1;
            if (state.timeEl) state.timeEl.textContent = formatMinesTime(state.timer);
        }, 1000);
    }

    function stopMinesTimer(state) {
        if (state.timerId) {
            window.clearInterval(state.timerId);
            state.timerId = null;
        }
    }

    function getMinesNeighbors(state, row, col) {
        const neighbors = [];
        for (let rowOffset = -1; rowOffset <= 1; rowOffset += 1) {
            for (let colOffset = -1; colOffset <= 1; colOffset += 1) {
                if (rowOffset === 0 && colOffset === 0) continue;
                const nextRow = row + rowOffset;
                const nextCol = col + colOffset;
                if (nextRow < 0 || nextCol < 0 || nextRow >= state.rows || nextCol >= state.cols) continue;
                neighbors.push([nextRow, nextCol]);
            }
        }
        return neighbors;
    }

    function generateMinesBoard(state, safeRow, safeCol) {
        const safeCells = new Set();
        for (let rowOffset = -1; rowOffset <= 1; rowOffset += 1) {
            for (let colOffset = -1; colOffset <= 1; colOffset += 1) {
                const nextRow = safeRow + rowOffset;
                const nextCol = safeCol + colOffset;
                if (nextRow < 0 || nextCol < 0 || nextRow >= state.rows || nextCol >= state.cols) continue;
                safeCells.add(nextRow + ":" + nextCol);
            }
        }

        const openCells = [];
        for (let row = 0; row < state.rows; row += 1) {
            for (let col = 0; col < state.cols; col += 1) {
                if (!safeCells.has(row + ":" + col)) {
                    openCells.push([row, col]);
                }
            }
        }

        const mineTarget = Math.min(state.mines, openCells.length);
        for (let mineIndex = 0; mineIndex < mineTarget; mineIndex += 1) {
            const randomIndex = Math.floor(Math.random() * openCells.length);
            const choice = openCells.splice(randomIndex, 1)[0];
            const cell = state.board[choice[0]][choice[1]];
            cell.mine = true;
        }

        for (let row = 0; row < state.rows; row += 1) {
            for (let col = 0; col < state.cols; col += 1) {
                const cell = state.board[row][col];
                if (cell.mine) continue;
                cell.adjacent = getMinesNeighbors(state, row, col).reduce((count, position) => {
                    const neighbor = state.board[position[0]][position[1]];
                    return count + (neighbor.mine ? 1 : 0);
                }, 0);
            }
        }
    }

    function revealMinesCellFromButton(state, button) {
        if (!state || state.paused || state.gameOver || state.won) return;
        const row = Number(button.dataset.row);
        const col = Number(button.dataset.col);
        if (!Number.isFinite(row) || !Number.isFinite(col)) return;
        revealMinesCell(state, row, col);
    }

    function revealMinesCell(state, row, col) {
        const cell = state.board[row] && state.board[row][col];
        if (!cell || cell.revealed || cell.mark === "flag") return;

        if (!state.generated) {
            generateMinesBoard(state, row, col);
            state.generated = true;
            state.firstMove = false;
            startMinesTimer(state);
        }

        if (cell.mine) {
            triggerMinesLoss(state, row, col);
            return;
        }

        const queue = [[row, col]];
        while (queue.length) {
            const next = queue.shift();
            const current = state.board[next[0]][next[1]];
            if (!current || current.revealed || current.mark === "flag") continue;
            current.revealed = true;
            state.revealed += 1;
            if (current.adjacent === 0) {
                getMinesNeighbors(state, current.row, current.col).forEach((neighbor) => {
                    const neighborCell = state.board[neighbor[0]][neighbor[1]];
                    if (neighborCell && !neighborCell.revealed && neighborCell.mark !== "flag") {
                        queue.push(neighbor);
                    }
                });
            }
        }

        syncMinesUi(state);
        checkMinesWin(state);
    }

    function triggerMinesLoss(state, row, col) {
        state.gameOver = true;
        state.paused = false;
        stopMinesTimer(state);

        for (let currentRow = 0; currentRow < state.rows; currentRow += 1) {
            for (let currentCol = 0; currentCol < state.cols; currentCol += 1) {
                const cell = state.board[currentRow][currentCol];
                if (cell.mine) {
                    cell.revealed = true;
                }
                if (cell.mark === "flag" && !cell.mine) {
                    cell.wrongFlag = true;
                }
                if (currentRow === row && currentCol === col) {
                    cell.blasted = true;
                    cell.revealed = true;
                }
            }
        }

        syncMinesUi(state);
    }

    function checkMinesWin(state) {
        if (state.gameOver || state.won) return;
        const safeTiles = state.rows * state.cols - state.mines;
        if (state.revealed >= safeTiles) {
            state.won = true;
            state.paused = false;
            stopMinesTimer(state);
            syncMinesUi(state);
        }
    }

    function toggleMinesMark(state, button) {
        if (!state || state.paused || state.gameOver || state.won) return;
        const row = Number(button.dataset.row);
        const col = Number(button.dataset.col);
        const cell = state.board[row] && state.board[row][col];
        if (!cell || cell.revealed) return;

        if (cell.mark === "none") {
            cell.mark = "flag";
            state.flagged += 1;
        } else if (cell.mark === "flag") {
            state.flagged = Math.max(0, state.flagged - 1);
            cell.mark = state.questionFlags ? "question" : "none";
        } else if (cell.mark === "question") {
            cell.mark = "none";
        }

        syncMinesUi(state);
    }

    function toggleMinesPause(state) {
        if (!state || state.gameOver || state.won) return;
        state.paused = !state.paused;
        if (state.paused) {
            stopMinesTimer(state);
        } else {
            startMinesTimer(state);
        }
        syncMinesUi(state);
    }

    function toggleMinesMenu(state, nextOpen) {
        if (!state || !state.menuEl) return;
        const shouldOpen = typeof nextOpen === "boolean" ? nextOpen : !state.menuOpen;
        state.menuOpen = shouldOpen;
        state.menuEl.hidden = !shouldOpen;
    }

    function useMinesHint(state) {
        if (!state || state.paused || state.gameOver || state.won) return;
        const penalty = 10;
        let candidate = null;
        for (let row = 0; row < state.rows && !candidate; row += 1) {
            for (let col = 0; col < state.cols; col += 1) {
                const cell = state.board[row][col];
                if (!cell.revealed && cell.mark !== "flag" && !cell.mine) {
                    candidate = cell;
                    break;
                }
            }
        }
        if (!candidate) return;
        if (!state.generated) {
            generateMinesBoard(state, candidate.row, candidate.col);
            state.generated = true;
            startMinesTimer(state);
        }
        state.timer += penalty;
        if (state.timeEl) state.timeEl.textContent = formatMinesTime(state.timer);
        revealMinesCell(state, candidate.row, candidate.col);
    }

    function applyMinesCustomDifficulty(state) {
        if (!state) return;
        const rowsValue = window.prompt("Rows", String(state.rows));
        if (rowsValue === null) return;
        const nextRows = Number(rowsValue);
        if (!Number.isFinite(nextRows)) return;
        const colsValue = window.prompt("Columns", String(state.cols));
        if (colsValue === null) return;
        const nextCols = Number(colsValue);
        if (!Number.isFinite(nextCols)) return;
        const minesValue = window.prompt("Mines", String(state.mines));
        if (minesValue === null) return;
        const nextMines = Number(minesValue);
        if (!Number.isFinite(nextMines)) return;

        const rows = Math.max(5, Math.min(30, Math.floor(nextRows)));
        const cols = Math.max(5, Math.min(40, Math.floor(nextCols)));
        const maxMines = Math.max(1, rows * cols - 1);
        const mines = Math.max(1, Math.min(maxMines, Math.floor(nextMines)));
        minesPresets.custom = { label: "Custom", rows: rows, cols: cols, mines: mines };
        resetMinesGame(state, "custom");
    }
