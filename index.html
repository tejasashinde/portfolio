<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Tejas Shinde</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;600&display=swap');

:root {
    --matrix-green: #20C20E;
    --terminal-bg: #0A0A0A;
}

body {
    font-family: 'Source Code Pro', monospace;
    background-color: #000;
    color: var(--matrix-green);
    overflow-x: hidden;
}

.terminal {
    background-color: var(--terminal-bg);
    border: 1px solid #333;
    border-radius: 5px;
    box-shadow: 0 0 20px rgba(32, 194, 14, 0.2);
    margin: 0 auto;
}

.terminal-header {
    background-color: #111;
    border-bottom: 1px solid #333;
}

.terminal-body {
    height: 600px;  /* Keep taller terminal */
    overflow-y: auto;
    padding: 15px;
}

.command-line {
    display: flex;
    align-items: center;
    margin-bottom: 5px;
}

.prompt {
    color: var(--matrix-green);
    margin-right: 5px;
}

.terminal-input {
    color: white !important;
    background-color: transparent;
    border: none;
    outline: none;
    flex: 1;
    caret-color: var(--matrix-green);
}

.echo-command { color: white; }

.response { margin-left: 20px; margin-bottom: 3px; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: var(--matrix-green); border-radius: 4px; }

</style>
</head>
<body>
<div class="container mx-auto px-4 py-10 max-w-6xl">
    <header class="text-center mb-12">
        <h1 class="text-4xl md:text-6xl font-bold mb-4 text-white">Tejas Shinde</h1>
        <p class="text-xl md:text-2xl opacity-80 text-yellow-500">Web Developer</p>
    </header>

    <div class="terminal mb-16">
        <div class="terminal-header flex items-center p-3">
            <div class="flex space-x-2 mr-4">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
            <div class="text-sm opacity-70">terminal --profile=tejasshinde</div>
        </div>
        <div class="terminal-body" id="terminal-output"></div>
    </div>

    <footer class="text-center py-8 border-t border-gray-800">
        <p class="opacity-70">>_ 2026. All systems operational.</p>
    </footer>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const terminalOutput = document.getElementById('terminal-output');

    const commands = {
        whoami: () => [
            "<span style='color:yellow;'>Hello, I'm Tejas Shinde</span>",
            "- PHP Developer with 4+ years of experience crafting robust web applications",
            "- Specializing in Laravel and CakePHP Frameworks",
            "- Self-taught Python developer focused on AI-driven applications and real-world tools",
        ],
        skills: () => [
            "<span style='color:yellow;'>Here are my skills:</span>",
            "1. <span style='color:white;'>PHP 8.x</span> - Modern server-side scripting language for building dynamic web applications",
            "2. <span style='color:white;'>Laravel</span> - Popular PHP framework for building scalable, secure, and maintainable web applications quickly",
            "3. <span style='color:white;'>CakePHP</span> - PHP framework focused on convention over configuration, enabling rapid application development",
            "4. <span style='color:white;'>Python</span> - High-level, versatile programming language known for readability, simplicity, and broad ecosystem",
            "5. <span style='color:white;'>Gradio</span> - Python framework for easily building and sharing machine learning demos and web interfaces",
            "6. <span style='color:white;'>MySQL/MariaDB</span> - Relational database system for managing structured data efficiently"
        ],
        experience: () => [
            "<span style='color:yellow;'>My Experience:</span>",
            "<span style='color:white;'>RESEARCH SCIENTIST (COMPUTER) @ SAMEER</span>",
            "Aug 2023 – Current",
            "&nbsp;&nbsp;&nbsp;&nbsp;- Developed dynamic web-based applications including a QR code-based Bus Pass System and Manpower Requisition Portal using Laravel.",
            "&nbsp;&nbsp;&nbsp;&nbsp;- Leveraged Laravel framework for rapid, scalable and maintainable application development.",
            "<br>",
            "<span style='color:white;'>RESEARCH SCIENTIST (COMPUTER) @ SAMEER</span>",
            "July 2021 – July 2023",
            "&nbsp;&nbsp;&nbsp;&nbsp;- Implemented CakePHP framework to design and develop an Online Recruitment Portal.",
            "&nbsp;&nbsp;&nbsp;&nbsp;- Streamlined employee performance appraisal management within the organization.",
            "<br>",
            "<span style='color:white;'>GRADUATE APPRENTICESHIP TRAINEE @ SAMEER</span>",
            "Dec 2018 – Dec 2019",
            "&nbsp;&nbsp;&nbsp;&nbsp;- Developed web applications using CakePHP for rapid application development.",
            "&nbsp;&nbsp;&nbsp;&nbsp;- Built an Online Annual Performance Appraisal Report (APAR) system.",
            "&nbsp;&nbsp;&nbsp;&nbsp;- Developed an Online Recruitment Portal enabling complete digital recruitment workflow."
        ],
        contact: () => [
            "<span style='color:yellow;'>You can contact me on:</span>",
            "🚀 GitHub: <a target='__blank' href='https://github.com/tejasashinde'>https://github.com/tejasashinde</a>",
            "🤗 HuggingFace: <a target='__blank' href='https://huggingface.co/tejasashinde'>https://huggingface.co/tejasashinde</a>",
        ],
        help: () => [
            "<span style='color:yellow;'>Available commands:</span> ",
            "clear     - Clear this terminal screen",
            "contact   - Show ways to reach me",
            "experience - Show my professional experience",
            "help      - Show this help menu",
            "projects  - Show my projects",
            "skills    - Show my technical skills",
            "whoami    - Show info about me"
        ],
        education: () => [
            "<span style='color:yellow;'>My Education:</span>",
            "B.E in Computer Engineering"
        ],
        projects: () => [
            "<span style='color:yellow;'>My Projects:</span>",
            "<span style='color:white;'>1. <span style='color:yellow;'>Name of Project:</span> Online Annual Performance Appraisal Report (APAR) System</span>",
            "&emsp;&nbsp;<span style='color:yellow;'>Description:</span> Web-based application for managing employee performance appraisals, allowing employees to submit annual work reports to higher authorities based on reporting structure.",
            "<br/>",
            "<span style='color:white;'>2. <span style='color:yellow;'>Name of Project:</span> Online Recruitment Portal</span>",
            "&emsp;&nbsp;<span style='color:yellow;'>Description:</span> Digitizes the offline recruitment process by allowing candidates to register and apply for multiple positions. Essentially replicates the offline form in digital format.",
            "<br/>",
            "<span style='color:white;'>3. <span style='color:yellow;'>Name of Project:</span> Device Registration Portal</span>",
            "&emsp;&nbsp;<span style='color:yellow;'>Description:</span> Web application enabling employees to register devices (Desktop, Laptop, Mobile, etc.) MAC addresses for internet access via the organization’s proxy tunnel, digitally recording all device access to the network.",
            "<br/>",
            "<span style='color:white;'>4. <span style='color:yellow;'>Name of Project:</span> Manpower Requisition Portal</span>",
            "&emsp;&nbsp;<span style='color:yellow;'>Description:</span> Web application for maintaining online records of manpower requests/allocation per project,allowing department heads to acquire manpower based on required qualifications.",
            "<br/>",
            "<span style='color:white;'>5. <span style='color:yellow;'>Name of Project:</span> Bus Pass Portal</span>",
            "&emsp;&nbsp;<span style='color:yellow;'>Description:</span> Web application for generating QR code based bus passes for staff and managing daily attendance.",
        ],
        clear: () => {
            terminalOutput.innerHTML = '';
            return [];
        }
    };

    let history = [];
    let historyIndex = -1;

    const createInputLine = () => {
        const line = document.createElement('div');
        line.className = 'command-line';
        line.innerHTML = `<span class="prompt">></span>
            <input type="text" placeholder="Type 'help' to see available commands." class="terminal-input" autocomplete="off" autofocus />`;
        terminalOutput.appendChild(line);

        const input = line.querySelector('input');
        input.focus();

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleCommand(input.value.trim(), line);
            else if (e.key === 'ArrowUp') { if(history.length && historyIndex > 0) input.value = history[--historyIndex]; }
            else if (e.key === 'ArrowDown') { if(history.length && historyIndex < history.length-1) input.value = history[++historyIndex]; else input.value=''; }
        });
    };

    const handleCommand = (cmd, lineElement) => {
        const input = lineElement.querySelector('input');
        input.disabled = true;

        const echo = document.createElement('div');
        echo.className = 'command-line echo-command';
        echo.innerHTML = `<span class="prompt">></span> ${cmd}`;
        terminalOutput.replaceChild(echo, lineElement);

        if(cmd) { history.push(cmd); historyIndex = history.length; }

        const responseLines = commands[cmd] ? commands[cmd]() : ["Command not recognized. Type 'help' for a list of commands."];
        responseLines.forEach(text => {
            const resp = document.createElement('div');
            resp.className = 'response';
            resp.innerHTML = `<p>${text}</p>`;
            terminalOutput.appendChild(resp);
        });

        createInputLine();
        terminalOutput.scrollTop = terminalOutput.scrollHeight;
    };

    const welcome = document.createElement('div');
    welcome.className = 'response';
    welcome.innerHTML = `<p style="color: yellow;">Welcome! You’ve entered my terminal playground. Start typing to discover more about me.</p>`;
    terminalOutput.appendChild(welcome);

    createInputLine();
});
</script>
</body>
</html>
